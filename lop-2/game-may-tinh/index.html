<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khám Phá Máy Tính - Lớp 2</title>
<style>
  :root{
    --sky1:#a8e6ff; --sky2:#e9f7ff; --ink:#2b3a55;
    --amber:#f4b860; --cyan:#7cc4ff; --green:#7bd88f; --red:#ff8f8f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Nunito',sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2) 60%,#fff);
    color:var(--ink); min-height:100vh; overflow-x:hidden;
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  #app{max-width:920px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column}

  /* ---------- HUD ---------- */
  #hud{display:flex;align-items:center;gap:8px;background:#fff;border-radius:18px;
    padding:8px 12px;box-shadow:0 6px 18px rgba(43,58,85,.12);margin-bottom:12px;flex-wrap:wrap}
  #hud .pill{font-weight:800;font-size:1rem;background:#f1f7ff;border-radius:14px;padding:6px 12px;white-space:nowrap;display:inline-block}
  .progress{flex:1;height:16px;background:#e6eefc;border-radius:12px;overflow:hidden;min-width:60px}
  #progressFill{height:100%;width:0;border-radius:12px;background:linear-gradient(90deg,var(--green),#3fc46a);transition:width .4s}
  .hud-score{color:#e8890b}
  .hud-star{color:#f0a500}
  .pill.streak{background:linear-gradient(90deg,#ffd36e,#ff8a3d);color:#7a2e00}
  #soundBtn{border:none;background:#f1f7ff;font-size:1.3rem;width:44px;height:44px;border-radius:14px;cursor:pointer}
  #soundBtn:active{transform:scale(.92)}
  .pill.bump{animation:bump .45s}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.4)}100%{transform:scale(1)}}

  /* ---------- Screens ---------- */
  .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  h1{font-size:clamp(2rem,7vw,3.2rem);line-height:1.1;
    background:linear-gradient(90deg,#ff7eb3,#7c4dff,#00b4d8);-webkit-background-clip:text;
    background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 3px 0 rgba(255,255,255,.6))}
  .sub{font-size:clamp(1rem,3.5vw,1.35rem);color:#4a5b78;margin:10px 0 6px;font-weight:700}
  .hint{color:#5a6b88;font-size:1.05rem;margin-top:14px;font-weight:700}
  .hint b{color:#e8890b}

  .big-btn{border:none;cursor:pointer;font-weight:900;color:#fff;font-size:clamp(1.2rem,4vw,1.6rem);
    padding:16px 34px;border-radius:22px;margin-top:22px;
    background:linear-gradient(180deg,#ffb347,#ff8c00);box-shadow:0 8px 0 #d97400,0 12px 22px rgba(217,116,0,.4);
    transition:transform .08s,box-shadow .08s}
  .big-btn:active{transform:translateY(6px);box-shadow:0 2px 0 #d97400,0 6px 12px rgba(217,116,0,.4)}
  .big-btn.green{background:linear-gradient(180deg,#67e28c,#25c15c);box-shadow:0 8px 0 #189745,0 12px 22px rgba(24,151,69,.4)}
  .big-btn.green:active{box-shadow:0 2px 0 #189745,0 6px 12px rgba(24,151,69,.4)}

  /* preview row on start */
  .preview{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:16px;max-width:560px}
  .preview .p{width:78px;height:78px;background:#fff;border-radius:16px;box-shadow:0 4px 10px rgba(43,58,85,.12);
    display:flex;align-items:center;justify-content:center;animation:bob 2.4s ease-in-out infinite}
  .preview .p svg{width:60px;height:60px}
  .preview .p:nth-child(2){animation-delay:.15s}.preview .p:nth-child(3){animation-delay:.3s}
  .preview .p:nth-child(4){animation-delay:.45s}.preview .p:nth-child(5){animation-delay:.6s}
  .preview .p:nth-child(6){animation-delay:.75s}.preview .p:nth-child(7){animation-delay:.9s}
  .preview .p:nth-child(8){animation-delay:1.05s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  /* ---------- Game ---------- */
  #gameScreen{justify-content:flex-start;padding-top:6px}
  #qbar{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 16px}
  #qtext{font-size:clamp(1.2rem,4.6vw,1.9rem);font-weight:900;color:#2b3a55;
    background:#fff;border-radius:18px;padding:14px 20px;box-shadow:0 6px 16px rgba(43,58,85,.12);animation:pop .3s}
  #qtext b{color:#e8890b}
  .listen{border:none;background:#fff;font-size:1.5rem;width:54px;height:54px;border-radius:16px;cursor:pointer;
    box-shadow:0 5px 12px rgba(43,58,85,.18);flex:0 0 auto;animation:ring 2.5s ease-in-out infinite}
  .listen:active{transform:scale(.9)}
  @keyframes ring{0%,92%,100%{transform:rotate(0)}94%{transform:rotate(-14deg)}96%{transform:rotate(12deg)}98%{transform:rotate(-8deg)}}
  @keyframes pop{0%{transform:scale(.7)}70%{transform:scale(1.06)}100%{transform:scale(1)}}

  /* drop zone (câu kéo) */
  .dropzone{width:min(92%,440px);margin:0 auto 14px;min-height:118px;border:5px dashed #ffb84d;border-radius:26px;
    display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.55);
    color:#c07a1e;font-weight:800;font-size:1.05rem;transition:transform .15s,background .15s,border-color .15s}
  .dropzone.over{background:#fff4dd;border-color:#ff8a3d;transform:scale(1.04)}
  .dropzone.filled{border-style:solid;border-color:#25c15c;background:#eafbf0}
  .dropzone .drop-art{width:96px;height:96px;display:inline-flex}
  .dropzone .drop-art svg{width:100%;height:100%}

  /* answer options */
  .options{width:100%;display:flex;flex-wrap:wrap;justify-content:center;gap:14px}
  .opt{position:relative;background:#fff;border-radius:22px;padding:12px 8px 10px;cursor:pointer;
    width:clamp(126px,27vw,180px);box-shadow:0 6px 16px rgba(43,58,85,.12);border:4px solid transparent;
    display:flex;flex-direction:column;align-items:center;gap:6px;touch-action:none;
    transition:transform .12s,border-color .15s,box-shadow .15s}
  .opt:hover{transform:translateY(-5px)}
  .opt:active{transform:scale(.97)}
  .opt .art{width:100%;aspect-ratio:1/.86;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .opt .art svg{width:84%;height:84%;max-height:120px}
  .opt .olabel{font-weight:800;font-size:1rem;color:#3d5273;pointer-events:none}
  .opt.correct{border-color:#25c15c;box-shadow:0 0 0 4px rgba(123,216,143,.4),0 8px 20px rgba(37,193,92,.3);animation:cbounce .5s}
  .opt.wrong{border-color:#ff6b6b;animation:shake .4s}
  .opt.hintglow{animation:glow 1.1s ease-in-out infinite}
  .opt.dragging{opacity:.3}
  @keyframes cbounce{0%{transform:scale(1)}30%{transform:scale(1.13)}60%{transform:scale(.96)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  @keyframes glow{0%,100%{box-shadow:0 6px 16px rgba(43,58,85,.12)}50%{box-shadow:0 0 0 6px rgba(244,184,96,.6),0 8px 20px rgba(244,184,96,.5)}}
  #dragGhost{position:fixed;left:0;top:0;z-index:999;pointer-events:none;transform:translate(-50%,-50%) rotate(-4deg) scale(1.06)}

  /* ---------- Hiệu ứng điểm ---------- */
  .gain{position:fixed;z-index:950;pointer-events:none;font-weight:900;font-size:1.7rem;
    transform:translate(-50%,-50%);text-shadow:0 2px 0 #fff;animation:gainrise 1.1s ease-out forwards}
  .gain.gscore{color:#e8890b}
  .gain.gstar{color:#f0a500}
  .gain.gbonus{color:#ff5a00}
  @keyframes gainrise{0%{opacity:0;transform:translate(-50%,-30%) scale(.5)}
    20%{opacity:1;transform:translate(-50%,-70%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-160%) scale(1)}}
  .streakpop{position:fixed;left:50%;top:40%;transform:translate(-50%,-50%);z-index:960;pointer-events:none;
    font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#ff6a00;text-shadow:0 3px 0 #fff,0 0 18px rgba(255,138,61,.6);
    animation:spop 1.2s ease-out forwards}
  @keyframes spop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-8deg)}
    25%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(4deg)}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}
  .burst{position:fixed;z-index:900;pointer-events:none;font-size:1.7rem;animation:fly 1s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3)}}

  /* end */
  #endEmoji{font-size:5rem;animation:bob 2s ease-in-out infinite}
  #endTitle{font-size:clamp(1.6rem,6vw,2.4rem);margin:6px 0}
  #endStats{font-size:1.2rem;font-weight:800;color:#4a5b78;line-height:1.8}
  #endStats .big{font-size:1.8rem;color:#e8890b}

  .credit{text-align:center;color:#6b7c99;font-size:.85rem;padding:12px 0 4px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <header id="hud" hidden>
    <span class="pill">Câu <span id="qnum">1</span>/<span id="qtot">8</span></span>
    <div class="progress"><div id="progressFill"></div></div>
    <span class="pill streak" id="streakPill" hidden>🔥 <span id="streak">0</span></span>
    <span class="pill hud-star" id="starPill">⭐ <span id="stars">0</span></span>
    <span class="pill hud-score" id="scorePill">🏅 <span id="score">0</span></span>
    <button id="soundBtn" title="Bật/tắt âm thanh">🔊</button>
  </header>

  <!-- START -->
  <section id="startScreen" class="screen">
    <h1>Khám Phá Máy Tính</h1>
    <p class="sub">Nghe câu hỏi và chọn hình đúng nhé!</p>
    <div class="preview" id="preview"></div>
    <button class="big-btn" id="startBtn">▶ Bắt đầu chơi</button>
    <p class="hint">👩‍🏫 Cô đọc câu hỏi — con <b>chọn</b> hoặc <b>kéo</b> hình đúng!</p>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen" hidden>
    <div id="qbar">
      <button class="listen" id="listenBtn" title="Nghe câu hỏi">🔔</button>
      <div id="qtext"></div>
    </div>
    <div id="dropzone" class="dropzone" hidden></div>
    <div id="options" class="options"></div>
  </section>

  <!-- END -->
  <section id="endScreen" class="screen" hidden>
    <div id="endEmoji">🎉</div>
    <h2 id="endTitle"></h2>
    <p id="endStats"></p>
    <button class="big-btn green" id="replayBtn">🔄 Chơi lại</button>
  </section>

  <p class="credit">Cô Bùi Thị Phương Trúc • Trường Trung-Tiểu học Pétrus Ký</p>
</div>

<script>
/* ================= DỮ LIỆU BỘ PHẬN ================= */
const PARTS = [
  {id:'manhinh', name:'Màn hình',  use:'Cho em nhìn thấy hình ảnh và chữ.',            q:'giúp em nhìn thấy hình ảnh và chữ'},
  {id:'thanmay', name:'Thân máy',  use:'Là bộ não giúp máy tính hoạt động.',           q:'là bộ não của máy tính'},
  {id:'banphim', name:'Bàn phím',  use:'Dùng để gõ chữ và số.',                        q:'dùng để gõ chữ và số'},
  {id:'chuot',   name:'Chuột',     use:'Dùng để di chuyển và nhấp chọn.',              q:'dùng để di chuyển con trỏ và nhấp chọn'},
  {id:'loa',     name:'Loa',       use:'Dùng để phát ra âm thanh cho cả lớp cùng nghe.',q:'phát ra âm thanh to cho cả lớp cùng nghe', twin:'tainghe'},
  {id:'tainghe', name:'Tai nghe',  use:'Đeo vào tai để nghe âm thanh.',                q:'đeo vào tai để nghe âm thanh', twin:'loa'},
  {id:'laptop',  name:'Máy tính xách tay', short:'Laptop', use:'Là máy tính nhỏ gọn, mang đi được.', q:'là máy tính nhỏ gọn, mang đi được'},
  {id:'mayin',   name:'Máy in',    use:'Dùng để in bài ra giấy.',                      q:'dùng để in bài ra giấy'},
];

/* ================= HÌNH VẼ SVG ================= */
function svgFor(id){
  switch(id){
    case 'manhinh': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="12" y="16" width="96" height="66" rx="9" fill="#2b3a55"/>
        <rect x="18" y="22" width="84" height="54" rx="5" fill="#8fd3ff"/>
        <circle cx="40" cy="42" r="8" fill="#ffe27a"/>
        <path d="M18 68 L40 52 L56 63 L78 46 L102 64 L102 76 L18 76 Z" fill="#7bd88f"/>
        <rect x="53" y="82" width="14" height="12" fill="#3d5273"/>
        <rect x="36" y="93" width="48" height="9" rx="4" fill="#3d5273"/>
      </svg>`;
    case 'thanmay': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="37" y="8" width="46" height="104" rx="9" fill="#d3dcea" stroke="#9aa7ba" stroke-width="2"/>
        <circle cx="60" cy="24" r="7" fill="#67e28c" stroke="#25c15c" stroke-width="2"/>
        <rect x="47" y="40" width="26" height="6" rx="3" fill="#8a97ab"/>
        <rect x="47" y="51" width="26" height="6" rx="3" fill="#8a97ab"/>
        <rect x="49" y="70" width="22" height="3" rx="1.5" fill="#aab6c8"/>
        <rect x="49" y="77" width="22" height="3" rx="1.5" fill="#aab6c8"/>
        <rect x="49" y="84" width="22" height="3" rx="1.5" fill="#aab6c8"/>
        <rect x="47" y="96" width="16" height="6" rx="2" fill="#8a97ab"/>
      </svg>`;
    case 'banphim': {
      let keys='';
      for(let r=0;r<3;r++){for(let c=0;c<9;c++){
        keys+=`<rect x="${13+c*10.2}" y="${47+r*11}" width="8" height="8" rx="2" fill="#eaf1fb"/>`;}}
      return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="6" y="40" width="108" height="48" rx="10" fill="#3d5273"/>
        ${keys}
        <rect x="34" y="80" width="52" height="7" rx="3" fill="#eaf1fb"/>
      </svg>`;
    }
    case 'chuot': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <path d="M60 24 C60 8 84 12 84 2" fill="none" stroke="#9aa7ba" stroke-width="3" stroke-linecap="round"/>
        <path d="M60 26 C40 26 33 44 33 66 C33 92 45 108 60 108 C75 108 87 92 87 66 C87 44 80 26 60 26 Z"
              fill="#eef3fa" stroke="#9aa7ba" stroke-width="3"/>
        <path d="M60 27 L60 60" stroke="#9aa7ba" stroke-width="2.5"/>
        <rect x="56" y="40" width="8" height="14" rx="4" fill="#f4b860"/>
      </svg>`;
    case 'loa': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="34" y="12" width="42" height="96" rx="8" fill="#3d5273"/>
        <circle cx="55" cy="42" r="15" fill="#22314a"/><circle cx="55" cy="42" r="8" fill="#8fd3ff"/>
        <circle cx="55" cy="82" r="8" fill="#22314a"/><circle cx="55" cy="82" r="3.5" fill="#8fd3ff"/>
        <path d="M84 44 Q92 60 84 76" fill="none" stroke="#f4b860" stroke-width="3" stroke-linecap="round"/>
        <path d="M92 36 Q104 60 92 84" fill="none" stroke="#f4b860" stroke-width="3" stroke-linecap="round"/>
      </svg>`;
    case 'laptop': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="26" y="22" width="68" height="48" rx="5" fill="#2b3a55"/>
        <rect x="31" y="27" width="58" height="38" rx="3" fill="#8fd3ff"/>
        <circle cx="46" cy="41" r="6" fill="#ffe27a"/>
        <path d="M31 58 L47 47 L59 55 L75 43 L89 56 L89 65 L31 65 Z" fill="#7bd88f"/>
        <path d="M16 78 L104 78 L114 94 L6 94 Z" fill="#d3dcea" stroke="#9aa7ba" stroke-width="2"/>
        <rect x="48" y="82" width="24" height="5" rx="2.5" fill="#9aa7ba"/>
      </svg>`;
    case 'tainghe': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <path d="M22 70 A38 38 0 0 1 98 70" fill="none" stroke="#3d5273" stroke-width="9" stroke-linecap="round"/>
        <rect x="12" y="60" width="24" height="40" rx="11" fill="#3d5273"/>
        <rect x="84" y="60" width="24" height="40" rx="11" fill="#3d5273"/>
        <rect x="18" y="67" width="12" height="26" rx="6" fill="#8fd3ff"/>
        <rect x="90" y="67" width="12" height="26" rx="6" fill="#8fd3ff"/>
        <circle cx="24" cy="80" r="3.4" fill="#f4b860"/>
        <circle cx="96" cy="80" r="3.4" fill="#f4b860"/>
      </svg>`;
    case 'mayin': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="30" y="24" width="60" height="34" rx="3" fill="#fff" stroke="#cfd8e6" stroke-width="2"/>
        <rect x="38" y="34" width="44" height="3" rx="1.5" fill="#c3d0e2"/>
        <rect x="38" y="42" width="44" height="3" rx="1.5" fill="#c3d0e2"/>
        <rect x="38" y="50" width="30" height="3" rx="1.5" fill="#c3d0e2"/>
        <rect x="18" y="52" width="84" height="42" rx="8" fill="#d3dcea" stroke="#9aa7ba" stroke-width="2"/>
        <rect x="32" y="84" width="56" height="16" rx="3" fill="#eaf1fb" stroke="#cfd8e6" stroke-width="2"/>
        <circle cx="88" cy="64" r="4" fill="#67e28c"/>
        <rect x="26" y="62" width="18" height="5" rx="2.5" fill="#8a97ab"/>
      </svg>`;
  }
  return '';
}

/* ================= ÂM THANH ================= */
let soundOn = true, actx = null;
function ensureAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function tone(kind){
  if(!soundOn) return; ensureAudio(); if(!actx) return;
  const now = actx.currentTime;
  const notes = kind==='good' ? [660,880,1180] : kind==='streak' ? [660,880,1100,1320,1560] : kind==='bad' ? [200,150] : [520,700];
  notes.forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain();
    o.type = kind==='bad' ? 'sawtooth' : 'triangle'; o.frequency.value=f;
    const t=now+i*0.09;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.17);
  });
}
let viVoice=null;
function pickVoice(){
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  viVoice = vs.find(v=>/vi[-_]?VN/i.test(v.lang)) || vs.find(v=>/vietnam/i.test(v.name)) || null;
}
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text){
  if(!soundOn || !window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='vi-VN'; if(viVoice) u.voice=viVoice; u.rate=0.95; u.pitch=1.15;
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakThen(text, cb){
  let done=false; const go=()=>{ if(done) return; done=true; cb(); };
  if(!soundOn || !window.speechSynthesis){ setTimeout(go, 1400); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='vi-VN'; if(viVoice) u.voice=viVoice; u.rate=0.95; u.pitch=1.15;
    u.onend=go; u.onerror=()=>setTimeout(go,300);
    speechSynthesis.speak(u);
    setTimeout(go, Math.max(2000, text.length*95));
  }catch(e){ setTimeout(go,1500); }
}

/* ================= TRẠNG THÁI ================= */
let TOTAL = PARTS.length;                 // mỗi bộ phận 1 câu
let questions=[], qi=0, score=0, stars=0, streak=0, maxStreak=0, wrongCount=0, locked=false, lastSpeak='';

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function disp(p){return p.short||p.name;}
function say(p){return p.name;}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
const PRAISE=['Giỏi quá!','Chính xác!','Tuyệt vời!','Đúng rồi!','Xuất sắc!','Hoan hô!'];

function pickOptions(target, style){
  let pool=PARTS.filter(p=>p.id!==target.id);
  if(style==='use' && target.twin) pool=pool.filter(p=>p.id!==target.twin); // tránh 2 đáp án cùng đúng
  return shuffle([target, ...shuffle(pool).slice(0,3)]);
}
function buildQuestions(){
  return shuffle(PARTS).map((part,i)=>{
    const style = Math.random()<0.5 ? 'name' : 'use';
    return { part, style, mode: i%2===0 ? 'click' : 'drag', options: pickOptions(part, style) };
  });
}

/* ================= DỰNG CÂU HỎI ================= */
const optionsEl=document.getElementById('options');
const dzEl=document.getElementById('dropzone');
const qtextEl=document.getElementById('qtext');

function renderQuestion(){
  if(qi>=TOTAL){ return endGame(); }
  locked=false; wrongCount=0;
  const q=questions[qi];
  document.getElementById('qnum').textContent=qi+1;
  document.getElementById('progressFill').style.width=((qi)/TOTAL*100)+'%';

  // câu hỏi (cô đọc) + câu để đọc lại khi bấm 🔔
  let qt, spk;
  if(q.style==='name'){ qt=`Con hãy chọn hình: <b>${disp(q.part)}</b>`; spk='Con hãy chọn '+say(q.part); }
  else { qt=`Bộ phận nào ${q.part.q}?`; spk='Bộ phận nào '+q.part.q+'?'; }
  if(q.mode==='drag') qt='⬇ '+qt+' (kéo hình vào ô)';
  qtextEl.innerHTML=qt; lastSpeak=spk;

  // các đáp án
  optionsEl.innerHTML=q.options.map(p=>
    `<div class="opt" data-id="${p.id}"><div class="art">${svgFor(p.id)}</div><div class="olabel">${disp(p)}</div></div>`).join('');

  if(q.mode==='drag'){
    dzEl.hidden=false; dzEl.className='dropzone'; dzEl.innerHTML='📥 Kéo hình đúng thả vào đây';
  }else{
    dzEl.hidden=true;
  }
  // KHÔNG tự đọc — để cô giáo đọc. Bấm 🔔 nếu muốn máy đọc.
}

/* ================= ĐÚNG / SAI ================= */
function onCorrect(optEl, part){
  locked=true;
  optEl.classList.add('correct');
  tone('good'); burst(optEl);
  const firstTry = (wrongCount===0);
  if(firstTry){ streak++; if(streak>maxStreak)maxStreak=streak; } else { streak=0; }
  const bonus = (firstTry && streak>=2) ? 5 : 0;
  const gain = 10 + bonus;
  score += gain;
  if(firstTry){ stars++; document.getElementById('stars').textContent=stars; flashPill('starPill'); }
  animateScoreTo(score); flashPill('scorePill'); updateStreakPill();

  const r=optEl.getBoundingClientRect(), cx=r.left+r.width/2;
  floatGain(cx, r.top+10, '+10', 'gscore');
  if(firstTry) floatGain(cx, r.top-14, '+1 ⭐', 'gstar');
  if(bonus){ floatGain(cx, r.top-40, '+'+bonus+' 🔥', 'gbonus'); streakPop(streak); }

  document.getElementById('progressFill').style.width=((qi+1)/TOTAL*100)+'%';
  speakThen(rnd(PRAISE)+' Đây là '+say(part)+'. '+part.use, ()=>{ qi++; renderQuestion(); });
}
function onWrong(optEl){
  tone('bad');
  if(optEl){ optEl.classList.add('wrong'); setTimeout(()=>optEl.classList.remove('wrong'),450); }
  wrongCount++;
  if(wrongCount===1) speak('Chưa đúng, con thử lại nhé!');
  if(wrongCount>=2){ const c=optionsEl.querySelector('.opt[data-id="'+questions[qi].part.id+'"]'); if(c) c.classList.add('hintglow'); }
}

/* ---- CLICK ---- */
optionsEl.addEventListener('click',e=>{
  if(locked || questions[qi].mode!=='click') return;
  const opt=e.target.closest('.opt'); if(!opt) return;
  const part=questions[qi].part;
  if(opt.dataset.id===part.id) onCorrect(opt,part); else onWrong(opt);
});

/* ---- KÉO THẢ (pointer) ---- */
let drag=null, ghost=null;
optionsEl.addEventListener('pointerdown',e=>{
  if(locked || questions[qi].mode!=='drag') return;
  const opt=e.target.closest('.opt'); if(!opt) return;
  e.preventDefault();
  drag={opt,id:opt.dataset.id};
  opt.classList.add('dragging');
  ghost=opt.cloneNode(true); ghost.id='dragGhost'; ghost.classList.remove('dragging');
  document.body.appendChild(ghost); moveGhost(e.clientX,e.clientY);
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);
});
function moveGhost(x,y){ if(ghost){ghost.style.left=x+'px'; ghost.style.top=y+'px';} }
function zoneUnder(x,y){
  if(ghost) ghost.style.display='none';
  const el=document.elementFromPoint(x,y);
  if(ghost) ghost.style.display='';
  return el && el.closest ? el.closest('.dropzone') : null;
}
function onMove(e){
  if(!drag) return; moveGhost(e.clientX,e.clientY);
  dzEl.classList.toggle('over', !!zoneUnder(e.clientX,e.clientY));
}
function onUp(e){
  window.removeEventListener('pointermove',onMove);
  window.removeEventListener('pointerup',onUp);
  const onZone = zoneUnder(e.clientX,e.clientY);
  if(ghost){ ghost.remove(); ghost=null; }
  dzEl.classList.remove('over');
  if(drag.opt) drag.opt.classList.remove('dragging');
  const part=questions[qi].part;
  if(onZone){
    if(drag.id===part.id){
      dzEl.className='dropzone filled';
      dzEl.innerHTML=`<span class="drop-art">${svgFor(part.id)}</span>`;
      onCorrect(drag.opt, part);
    } else onWrong(drag.opt);
  }
  drag=null;
}

/* ================= HIỆU ỨNG ĐIỂM ================= */
let scoreAnim=null;
function animateScoreTo(target){
  const el=document.getElementById('score');
  let start=parseInt(el.textContent)||0;
  if(start===target){ el.textContent=target; return; }
  const t0=performance.now(), dur=550;
  cancelAnimationFrame(scoreAnim);
  (function step(t){
    const k=Math.min(1,(t-t0)/dur);
    el.textContent=Math.round(start+(target-start)*k);
    if(k<1) scoreAnim=requestAnimationFrame(step);
  })(t0);
}
function flashPill(id){ const el=document.getElementById(id); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
function updateStreakPill(){
  const pill=document.getElementById('streakPill');
  if(streak>=2){ pill.hidden=false; document.getElementById('streak').textContent=streak; flashPill('streakPill'); }
  else pill.hidden=true;
}
function floatGain(x,y,text,cls){
  const d=document.createElement('div'); d.className='gain '+cls; d.textContent=text;
  d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d);
  setTimeout(()=>d.remove(),1100);
}
function streakPop(n){
  const d=document.createElement('div'); d.className='streakpop'; d.textContent='🔥 Chuỗi '+n+'!';
  document.body.appendChild(d); setTimeout(()=>d.remove(),1200); tone('streak');
}
function burst(el){
  const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  const ic=['⭐','✨','🌟','💫','🎉','🎊'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div'); s.className='burst'; s.textContent=ic[i%ic.length];
    s.style.left=cx+'px'; s.style.top=cy+'px';
    const ang=Math.PI*2*i/12, dist=70+Math.random()*55;
    s.style.setProperty('--dx',Math.cos(ang)*dist+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist-20)+'px');
    document.body.appendChild(s); setTimeout(()=>s.remove(),1000);
  }
}

/* ================= KẾT THÚC ================= */
function endGame(){
  document.getElementById('gameScreen').hidden=true;
  document.getElementById('hud').hidden=true;
  document.getElementById('endScreen').hidden=false;
  let title,emoji; const r=TOTAL?stars/TOTAL:0;
  if(r>=0.9){title='Xuất sắc! Bé là chuyên gia máy tính!';emoji='🏆';}
  else if(r>=0.65){title='Giỏi lắm! Bé nhớ rất tốt!';emoji='🎉';}
  else if(r>=0.4){title='Tốt lắm! Bé cố lên nhé!';emoji='😃';}
  else {title='Cố gắng thêm nhé, bé làm được mà!';emoji='🌱';}
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endStats').innerHTML=
    `Điểm: <span class="big">${score}</span> 🏅<br>Sao: <span class="big">${stars}</span>/${TOTAL} ⭐<br>Chuỗi đúng dài nhất: <span class="big">${maxStreak}</span> 🔥`;
  tone('good'); speak(title+' Bé được '+score+' điểm.');
}

/* ================= NÚT & KHỞI ĐỘNG ================= */
document.getElementById('preview').innerHTML =
  PARTS.map(p=>`<div class="p" title="${p.name}">${svgFor(p.id)}</div>`).join('');

function startGame(){
  ensureAudio();
  questions=buildQuestions(); qi=0; score=0; stars=0; streak=0; maxStreak=0;
  document.getElementById('score').textContent=0;
  document.getElementById('stars').textContent=0;
  document.getElementById('streakPill').hidden=true;
  document.getElementById('qtot').textContent=TOTAL;
  document.getElementById('startScreen').hidden=true;
  document.getElementById('endScreen').hidden=true;
  document.getElementById('gameScreen').hidden=false;
  document.getElementById('hud').hidden=false;
  renderQuestion();
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('replayBtn').addEventListener('click',startGame);
document.getElementById('listenBtn').addEventListener('click',()=>speak(lastSpeak));
document.getElementById('soundBtn').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  if(!soundOn && window.speechSynthesis) speechSynthesis.cancel();
});
</script>
