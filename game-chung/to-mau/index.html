<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tô Màu Ngộ Nghĩnh</title>
<style>
  :root{ --ink:#2b3a55; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Nunito',sans-serif;
    background:linear-gradient(160deg,#e0f2fe,#f0fdfa 55%,#fff);color:var(--ink);min-height:100vh;
    overflow-x:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation;padding:12px}
  #app{max-width:960px;margin:0 auto}
  .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .back{color:#3d5273;text-decoration:none;font-weight:700;font-size:.95rem;background:#fff;padding:9px 16px;border-radius:16px;box-shadow:0 3px 8px rgba(43,58,85,.1);border:none;cursor:pointer}
  .back:active{transform:translateY(2px)}
  #sound{border:none;background:#fff;font-size:1.2rem;width:44px;height:44px;border-radius:14px;cursor:pointer;box-shadow:0 3px 8px rgba(43,58,85,.1);margin-left:auto}
  h1{font-size:clamp(1.5rem,5vw,2.1rem);text-align:center;margin:6px 0 2px;
    background:linear-gradient(90deg,#06b6d4,#db2777);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lead{text-align:center;color:#475569;font-weight:700;margin-bottom:14px;font-size:clamp(.95rem,3.4vw,1.15rem)}

  /* GALLERY */
  .gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:760px){.gallery{grid-template-columns:repeat(2,1fr)}}
  .pick{background:#fff;border-radius:22px;padding:12px 10px 10px;cursor:pointer;border:4px solid #fff;
    box-shadow:0 6px 16px rgba(43,58,85,.12);transition:transform .12s,border-color .12s;text-align:center}
  .pick:hover{transform:translateY(-4px)}
  .pick:active{transform:scale(.97)}
  .pick svg{width:100%;height:120px;display:block}
  .pick .nm{font-weight:800;margin-top:6px;font-size:clamp(.95rem,3.4vw,1.1rem)}
  .pick[data-cat="trai-cay"]{border-color:#fecdd3}
  .pick[data-cat="con-vat"]{border-color:#bbf7d0}
  .pick[data-cat="do-vat"]{border-color:#bfdbfe}
  .pick[data-cat="cay-coi"]{border-color:#bbf7d0}
  .pick[data-cat="bong-hoa"]{border-color:#fbcfe8}
  .pick[data-cat="phuong-tien"]{border-color:#fde68a}
  .pick[data-cat="phong-canh"]{border-color:#c7d2fe}
  .cat{display:inline-block;font-size:.72rem;font-weight:800;color:#fff;background:#94a3b8;border-radius:20px;padding:2px 10px;margin-top:4px}
  .lvl{display:inline-block;font-size:.7rem;font-weight:800;color:#f59e0b;margin-top:4px;letter-spacing:1px}
  .lvl b{color:#64748b;font-weight:800}

  /* COLORING */
  .stage{display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:start}
  @media(max-width:760px){.stage{grid-template-columns:1fr}}
  .canvas{background:#fff;border-radius:24px;padding:14px;box-shadow:0 8px 22px rgba(43,58,85,.14);position:relative}
  .canvas svg{width:100%;height:auto;display:block;max-height:60vh}
  .fillable{cursor:pointer;transition:fill .15s}
  .side{display:flex;flex-direction:column;gap:12px}
  .hintbox{background:#fff;border-radius:20px;padding:10px;box-shadow:0 6px 16px rgba(43,58,85,.12);text-align:center}
  .hintbox .ht{font-weight:800;color:#0891b2;font-size:.95rem;margin-bottom:6px}
  .hintbox svg{width:100%;height:auto;max-height:150px}
  @media(max-width:760px){.hintbox svg{max-height:120px}}

  .palette{background:#fff;border-radius:20px;padding:12px;box-shadow:0 6px 16px rgba(43,58,85,.12)}
  .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{width:100%;aspect-ratio:1;border-radius:50%;border:4px solid #fff;box-shadow:0 3px 7px rgba(43,58,85,.2);cursor:pointer;transition:transform .1s}
  .sw:active{transform:scale(.9)}
  .sw.sel{border-color:var(--ink);transform:scale(1.12);box-shadow:0 5px 12px rgba(43,58,85,.35)}
  .sw.eraser{background:#fff!important;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:4px dashed #cbd5e1}

  .row{display:flex;gap:10px;flex-wrap:wrap}
  .btn{border:none;cursor:pointer;font-weight:900;color:#fff;font-size:1rem;padding:12px 18px;border-radius:16px;flex:1;min-width:120px;
    background:linear-gradient(180deg,#67e28c,#25c15c);box-shadow:0 5px 0 #189745}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #189745}
  .btn.gray{background:linear-gradient(180deg,#cbd5e1,#94a3b8);box-shadow:0 5px 0 #64748b;color:#1e293b}
  .btn.gray:active{box-shadow:0 1px 0 #64748b}
  .btn.pink{background:linear-gradient(180deg,#f9a8d4,#ec4899);box-shadow:0 5px 0 #be185d}
  .btn.pink:active{box-shadow:0 1px 0 #be185d}

  /* completion overlay */
  .win{position:fixed;inset:0;background:rgba(15,23,42,.42);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .wincard{background:#fff;border-radius:26px;padding:22px 20px;text-align:center;max-width:360px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:pop .35s}
  .wincard .big{font-size:2.6rem}
  .wincard .msg{font-size:clamp(1.2rem,4.6vw,1.6rem);font-weight:900;color:#16a34a;margin:6px 0 14px}
  @keyframes pop{0%{transform:scale(.6)}70%{transform:scale(1.06)}100%{transform:scale(1)}}

  /* celebration animation on the picture */
  @keyframes wiggle{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-4deg) scale(1.03)}50%{transform:rotate(0) scale(1.06)}75%{transform:rotate(4deg) scale(1.03)}}
  .celebrate svg{animation:wiggle 1s ease-in-out 3;transform-origin:center}
  .googly{animation:eyepop .4s ease-out}
  @keyframes eyepop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}

  .burst{position:fixed;z-index:60;pointer-events:none;font-size:1.6rem;animation:fly 1.1s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6) rotate(0)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(var(--rot))}}
  .credit{text-align:center;color:#6b7c99;font-size:.82rem;padding:16px 0 4px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <button class="back" id="topBack">← Thư viện</button>
    <button id="sound" title="Bật/tắt âm thanh">🔊</button>
  </div>

  <!-- GALLERY SCREEN -->
  <section id="galleryScreen">
    <h1>🎨 Tô Màu Ngộ Nghĩnh</h1>
    <p class="lead">Chọn một hình để tô màu nào!</p>
    <div class="gallery" id="gallery"></div>
  </section>

  <!-- COLORING SCREEN -->
  <section id="colorScreen" hidden>
    <h1 id="colorTitle">Tô màu</h1>
    <p class="lead">Chọn một màu rồi chạm vào hình để tô 🖌️</p>
    <div class="stage">
      <div class="canvas" id="canvas"></div>
      <div class="side">
        <div class="hintbox">
          <div class="ht">Mẫu gợi ý</div>
          <div id="hint"></div>
        </div>
        <div class="palette">
          <div class="swatches" id="swatches"></div>
        </div>
        <div class="row">
          <button class="btn gray" id="resetBtn">🧽 Xóa hết</button>
        </div>
        <div class="row">
          <button class="btn pink" id="backBtn">← Thư viện</button>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="credit">Thiết kế bởi Bùi Thị Phương Trúc · Trường Trung-Tiểu học Pétrus Ký</div>

<!-- WIN OVERLAY -->
<div class="win" id="winBox" hidden>
  <div class="wincard">
    <div class="big" id="winFace">🎉</div>
    <div class="msg" id="winMsg">Đẹp quá!</div>
    <div class="row">
      <button class="btn" id="againBtn">🔄 Tô lại</button>
      <button class="btn pink" id="otherBtn">🖼️ Chọn hình khác</button>
    </div>
  </div>
</div>

   Non fillable details (eyes/outlines/stems drawn as strokes) are plain (not fillable). */

function P(k,def){ /* helper: a fillable attr string */ return ''; }

const PICTURES=[
  { id:'tao', name:'Quả táo', cat:'trai-cay', catName:'Trái cây', vb:'0 0 100 100',

  /* 3 · Cái cốc — 5 regions */

  const F=k==='tap'?[520,760]:k==='win'?[660,880,1100,1320,1560]:[440];
  F.forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;
    const t=n+i*0.09;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.22,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.16);

let viVoice=null;function pv(){const vs=window.speechSynthesis?speechSynthesis.getVoices():[];viVoice=vs.find(v=>/vi[-_]?VN/i.test(v.lang))||null;}
if(window.speechSynthesis){pv();speechSynthesis.onvoiceschanged=pv;}
function speak(t){if(!soundOn||!window.speechSynthesis)return;try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';if(viVoice)u.voice=viVoice;u.rate=.98;u.pitch=1.15;speechSynthesis.speak(u);}catch(e){}}

/* ===== gallery ===== */
function svgFor(pic,fillFn){return `<svg viewBox="${pic.vb}" xmlns="http://www.w3.org/2000/svg">${pic.build(fillFn)}</svg>`;}

function regionCount(pic){ return (pic.build(()=>BLANK).match(/class="fillable"/g)||[]).length; }
function stars(n){ const lv = n<=6?1 : n<=10?2 : 3; return '★'.repeat(lv)+'<b>'+'★'.repeat(3-lv)+'</b>'; }

function buildGallery(){
  const g=document.getElementById('gallery'); g.innerHTML='';
  PICTURES.forEach(pic=>{
    const d=document.createElement('div'); d.className='pick'; d.dataset.cat=pic.cat;
    const n=regionCount(pic);
    d.innerHTML = svgFor(pic, ()=>BLANK) + `<div class="nm">${pic.name}</div><div class="cat">${pic.catName}</div><div class="lvl" title="${n} ô để tô">${stars(n)}</div>`;
    d.addEventListener('click',()=>openPicture(pic));
    g.appendChild(d);
  });
}

/* ===== palette ===== */
function buildPalette(){
  const s=document.getElementById('swatches'); s.innerHTML='';
  COLORS.forEach(c=>{
    const b=document.createElement('div'); b.className='sw'; b.style.background=c; b.dataset.color=c;
    if(c===selColor) b.classList.add('sel');
    b.addEventListener('click',()=>selectColor(c,b));
    s.appendChild(b);
  });
  // eraser (paint back to blank)
  const e=document.createElement('div'); e.className='sw eraser'; e.textContent='🧽'; e.dataset.color=BLANK;
  e.addEventListener('click',()=>selectColor(BLANK,e));
  s.appendChild(e);
}
function selectColor(c,el){
  selColor=c;
  document.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

/* ===== coloring ===== */
function openPicture(pic){
  current=pic; filled={};
  document.getElementById('galleryScreen').hidden=true;
  document.getElementById('colorScreen').hidden=false;
  document.getElementById('colorTitle').textContent='Tô màu: '+pic.name;
  // hint = completed sample
  document.getElementById('hint').innerHTML = svgFor(pic, k=>pic.sample[k]||'#e2e8f0');
  // blank canvas
  const canvas=document.getElementById('canvas');
  canvas.className='canvas';
  canvas.innerHTML = svgFor(pic, ()=>BLANK);
  canvas.querySelectorAll('.fillable').forEach(sh=>{
    sh.addEventListener('click',()=>paint(sh));
  });
  buildPalette();
  window.scrollTo(0,0);
}

function paint(shape){
  const k=shape.getAttribute('data-k');
  shape.setAttribute('fill', selColor);
  if(selColor===BLANK){ delete filled[k]; }
  else { filled[k]=selColor; }
  tone('tap');
  checkDone();
}

function totalRegions(){ return document.querySelectorAll('#canvas .fillable').length; }
function filledCount(){
  let n=0;
  document.querySelectorAll('#canvas .fillable').forEach(sh=>{
    const f=(sh.getAttribute('fill')||'').toLowerCase();
    if(f && f!==BLANK) n++;
  });
  return n;
}
function checkDone(){
  if(filledCount()>=totalRegions()) celebrate();
}

/* ===== completion ===== */
const PRAISE=['Đẹp quá!','Tuyệt vời!','Giỏi lắm!','Hoan hô!','Bức tranh xinh ghê!'];
function celebrate(){
  const canvas=document.getElementById('canvas');
  addGooglyEyes(canvas);
  canvas.classList.add('celebrate');
  confetti();
  tone('win');
  const msg=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  const faces=['🎉','🥳','🌈','⭐','🎨'];
  document.getElementById('winFace').textContent=faces[Math.floor(Math.random()*faces.length)];
  document.getElementById('winMsg').textContent=msg;
  speak(msg+' Em tô màu rất giỏi.');
  setTimeout(()=>{ document.getElementById('winBox').hidden=false; }, 900);
}

/* add cute googly eyes + smile on top of the picture */
function addGooglyEyes(canvas){
  const svg=canvas.querySelector('svg'); if(!svg||svg.querySelector('.googlyG')) return;
  const vb=(current.vb||'0 0 100 100').split(/\s+/).map(Number);
  const w=vb[2]||100, h=vb[3]||100, cx=w/2, cy=h*0.44, r=Math.min(w,h)*0.07;
  const NS='http://www.w3.org/2000/svg';
  const gr=document.createElementNS(NS,'g'); gr.setAttribute('class','googlyG');
  function eye(ex){
    const e=document.createElementNS(NS,'circle'); e.setAttribute('cx',ex); e.setAttribute('cy',cy); e.setAttribute('r',r);
    e.setAttribute('fill','#fff'); e.setAttribute('stroke','#1e293b'); e.setAttribute('stroke-width','2.5'); e.setAttribute('class','googly');
    const p=document.createElementNS(NS,'circle'); p.setAttribute('cx',ex+r*0.25); p.setAttribute('cy',cy+r*0.25); p.setAttribute('r',r*0.45);
    p.setAttribute('fill','#1e293b'); p.setAttribute('class','googly');
    gr.appendChild(e); gr.appendChild(p);
  }
  eye(cx-r*1.6); eye(cx+r*1.6);
  const smile=document.createElementNS(NS,'path');
  smile.setAttribute('d',`M${cx-r*1.8} ${cy+r*2} Q ${cx} ${cy+r*4.4} ${cx+r*1.8} ${cy+r*2}`);
  smile.setAttribute('fill','none'); smile.setAttribute('stroke','#1e293b'); smile.setAttribute('stroke-width','3'); smile.setAttribute('stroke-linecap','round');
  smile.setAttribute('class','googly');
  gr.appendChild(smile);
  svg.appendChild(gr);
}

function confetti(){
  const ic=['⭐','✨','🌟','🎉','🌈','💖','🎈'];
  const cx=window.innerWidth/2, cy=window.innerHeight*0.4;
  for(let i=0;i<26;i++){
    const s=document.createElement('div'); s.className='burst'; s.textContent=ic[i%ic.length];
    s.style.left=cx+'px'; s.style.top=cy+'px';
    const a=Math.PI*2*i/26, d=120+Math.random()*160;
    s.style.setProperty('--dx',(Math.cos(a)*d)+'px');
    s.style.setProperty('--dy',(Math.sin(a)*d-40)+'px');
    s.style.setProperty('--rot',(Math.random()*360)+'deg');
    document.body.appendChild(s); setTimeout(()=>s.remove(),1150);
  }
}

/* ===== controls ===== */
function resetPicture(){
  if(!current) return;
  filled={};
  document.getElementById('winBox').hidden=true;
  openPicture(current);
}
function toGallery(){
  document.getElementById('winBox').hidden=true;
  document.getElementById('colorScreen').hidden=true;
  document.getElementById('galleryScreen').hidden=false;
  if(window.speechSynthesis) speechSynthesis.cancel();
  window.scrollTo(0,0);
}

document.getElementById('resetBtn').addEventListener('click',resetPicture);
document.getElementById('backBtn').addEventListener('click',toGallery);
document.getElementById('topBack').addEventListener('click',()=>{
  if(document.getElementById('colorScreen').hidden) location.href='../../index.html';
  else toGallery();
});
document.getElementById('againBtn').addEventListener('click',resetPicture);
document.getElementById('otherBtn').addEventListener('click',toGallery);
document.getElementById('sound').addEventListener('click',()=>{
  soundOn=!soundOn; document.getElementById('sound').textContent=soundOn?'🔊':'🔇';
  if(!soundOn&&window.speechSynthesis) speechSynthesis.cancel();
});

buildGallery();
</script>
</body>
