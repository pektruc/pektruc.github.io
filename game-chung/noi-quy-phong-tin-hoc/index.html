<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nội Quy Phòng Tin Học</title>
<style>
  :root{ --ink:#2b3a55; --green:#25c15c; --red:#ff5a5a; --amber:#f4b860; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Nunito',sans-serif;
    background:linear-gradient(160deg,#c8f0ff,#eef8ff 55%,#fff);color:var(--ink);min-height:100vh;
    overflow-x:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  #app{max-width:820px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column}

  /* HUD */
  #hud{display:flex;align-items:center;gap:8px;background:#fff;border-radius:18px;padding:8px 12px;
    box-shadow:0 6px 18px rgba(43,58,85,.12);margin-bottom:12px;flex-wrap:wrap}
  #hud .pill{font-weight:800;font-size:1rem;background:#f1f7ff;border-radius:14px;padding:6px 12px;white-space:nowrap}
  .progress{flex:1;height:16px;background:#e6eefc;border-radius:12px;overflow:hidden;min-width:60px}
  #progressFill{height:100%;width:0;border-radius:12px;background:linear-gradient(90deg,#7bd88f,#3fc46a);transition:width .4s}
  .hud-score{color:#e8890b}.hud-star{color:#f0a500}
  .pill.streak{background:linear-gradient(90deg,#ffd36e,#ff8a3d);color:#7a2e00}
  #soundBtn{border:none;background:#f1f7ff;font-size:1.3rem;width:44px;height:44px;border-radius:14px;cursor:pointer}
  #soundBtn:active{transform:scale(.92)}
  .pill.bump{animation:bump .45s}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.4)}100%{transform:scale(1)}}

  .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  #gameScreen{justify-content:flex-start;padding-top:6px}
  h1{font-size:clamp(1.9rem,6.5vw,3rem);line-height:1.1;
    background:linear-gradient(90deg,#ff7eb3,#7c4dff,#00b4d8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 3px 0 rgba(255,255,255,.6))}
  .sub{font-size:clamp(1rem,3.6vw,1.35rem);color:#4a5b78;margin:10px 0 6px;font-weight:700}
  .hint{color:#5a6b88;font-size:1.05rem;margin-top:14px;font-weight:700}
  .hint b{color:#e8890b}
  .big-btn{border:none;cursor:pointer;font-weight:900;color:#fff;font-size:clamp(1.2rem,4vw,1.6rem);padding:16px 34px;border-radius:22px;margin-top:22px;
    background:linear-gradient(180deg,#ffb347,#ff8c00);box-shadow:0 8px 0 #d97400,0 12px 22px rgba(217,116,0,.4);transition:transform .08s,box-shadow .08s}
  .big-btn:active{transform:translateY(6px);box-shadow:0 2px 0 #d97400,0 6px 12px rgba(217,116,0,.4)}
  .big-btn.green{background:linear-gradient(180deg,#67e28c,#25c15c);box-shadow:0 8px 0 #189745,0 12px 22px rgba(24,151,69,.4)}

  .preview{font-size:2.4rem;margin-top:14px;letter-spacing:6px}

  /* thẻ tình huống */
  #card{width:min(94%,560px);background:#fff;border-radius:26px;padding:22px 18px;margin:4px auto 8px;
    box-shadow:0 10px 26px rgba(43,58,85,.14);animation:pop .3s;position:relative}
  #cardEmoji{font-size:clamp(3.4rem,15vw,5.5rem);line-height:1.1}
  #cardText{font-size:clamp(1.25rem,5vw,1.9rem);font-weight:900;color:#2b3a55;margin-top:6px}
  #listenBtn{position:absolute;top:12px;right:12px;border:none;background:#f1f7ff;font-size:1.3rem;width:46px;height:46px;border-radius:14px;cursor:pointer;
    box-shadow:0 4px 10px rgba(43,58,85,.15);animation:ring 2.6s ease-in-out infinite}
  #listenBtn:active{transform:scale(.9)}
  @keyframes ring{0%,92%,100%{transform:rotate(0)}94%{transform:rotate(-14deg)}96%{transform:rotate(12deg)}98%{transform:rotate(-8deg)}}
  @keyframes pop{0%{transform:scale(.85)}70%{transform:scale(1.03)}100%{transform:scale(1)}}

  .ask{font-size:clamp(1.05rem,4vw,1.4rem);font-weight:800;color:#4a5b78;margin:6px 0 12px}
  .ask b{color:#e8890b}

  /* nút chọn */
  .choices{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;width:100%}
  .choice{border:none;cursor:pointer;color:#fff;font-weight:900;font-size:clamp(1.2rem,4.6vw,1.7rem);
    padding:20px 30px;border-radius:24px;min-width:190px;display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:transform .1s,box-shadow .1s,filter .1s}
  .choice .ic{font-size:2.4rem}
  .choice.nen{background:linear-gradient(180deg,#67e28c,#25c15c);box-shadow:0 8px 0 #189745}
  .choice.khong{background:linear-gradient(180deg,#ff8f8f,#ef4444);box-shadow:0 8px 0 #b91c1c}
  .choice:active{transform:translateY(5px)}
  .choice.nen:active{box-shadow:0 3px 0 #189745}.choice.khong:active{box-shadow:0 3px 0 #b91c1c}
  .choice.right{animation:cbounce .5s;filter:drop-shadow(0 0 12px rgba(37,193,92,.8))}
  .choice.wrongpick{animation:shake .4s;filter:grayscale(.3) brightness(.9)}
  .choice.reveal{outline:5px solid #ffe27a;outline-offset:3px}
  @keyframes cbounce{0%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(.96)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  #fb{min-height:2em;font-size:clamp(1.1rem,4.2vw,1.5rem);font-weight:900;margin-top:14px}
  #fb.good{color:#189745}#fb.bad{color:#e11d48}

  /* hiệu ứng */
  .cute{position:fixed;z-index:960;pointer-events:none;font-size:3rem;transform:translate(-50%,-50%);animation:cutePop 1.1s ease-out forwards}
  @keyframes cutePop{0%{opacity:0;transform:translate(-50%,-40%) scale(.3) rotate(-15deg)}30%{opacity:1;transform:translate(-50%,-70%) scale(1.25) rotate(6deg)}100%{opacity:0;transform:translate(-50%,-150%) scale(1)}}
  .gain{position:fixed;z-index:955;pointer-events:none;font-weight:900;font-size:1.6rem;color:#e8890b;text-shadow:0 2px 0 #fff;transform:translate(-50%,-50%);animation:gainrise 1.1s ease-out forwards}
  @keyframes gainrise{0%{opacity:0;transform:translate(-50%,-30%) scale(.5)}20%{opacity:1;transform:translate(-50%,-70%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-160%) scale(1)}}
  .burst{position:fixed;z-index:950;pointer-events:none;font-size:1.5rem;animation:fly 1s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3)}}

  /* kết thúc + ôn tập */
  #endEmoji{font-size:5rem;animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  #endTitle{font-size:clamp(1.6rem,6vw,2.3rem);margin:6px 0}
  #endStats{font-size:1.2rem;font-weight:800;color:#4a5b78;line-height:1.7}
  #endStats .big{font-size:1.8rem;color:#e8890b}
  .recap{width:min(94%,560px);margin:18px auto 0;text-align:left;background:#fff;border-radius:20px;padding:14px 18px;box-shadow:0 8px 20px rgba(43,58,85,.12)}
  .recap h3{color:#7c4dff;font-size:1.15rem;margin-bottom:8px;text-align:center}
  .recap li{list-style:none;font-weight:700;color:#3d5273;padding:5px 0;font-size:1rem;display:flex;gap:8px;align-items:flex-start}
  .recap li .n{color:#25c15c}
  .credit{text-align:center;color:#6b7c99;font-size:.85rem;padding:12px 0 4px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <header id="hud" hidden>
    <span class="pill">Câu <span id="qnum">1</span>/<span id="qtot">10</span></span>
    <div class="progress"><div id="progressFill"></div></div>
    <span class="pill streak" id="streakPill" hidden>🔥 <span id="streak">0</span></span>
    <span class="pill hud-star" id="starPill">⭐ <span id="stars">0</span></span>
    <span class="pill hud-score" id="scorePill">🏅 <span id="score">0</span></span>
    <button id="soundBtn" title="Bật/tắt âm thanh">🔊</button>
  </header>

  <!-- START -->
  <section id="startScreen" class="screen">
    <h1>Nội Quy Phòng Tin Học</h1>
    <p class="sub">Điều này NÊN hay KHÔNG NÊN? Bé chọn nhé!</p>
    <div class="preview">👍 ✅ 👎 ❌</div>
    <button class="big-btn" id="startBtn">▶ Bắt đầu chơi</button>
    <p class="hint">Nhìn hình, nghe cô đọc rồi chọn <b>NÊN</b> hoặc <b>KHÔNG NÊN</b></p>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen" hidden>
    <div id="card">
      <button id="listenBtn" title="Nghe lại">🔔</button>
      <div id="cardEmoji"></div>
      <div id="cardText"></div>
    </div>
    <div class="ask">Điều này <b>NÊN</b> hay <b>KHÔNG NÊN</b>?</div>
    <div class="choices">
      <button class="choice nen"   id="btnNen"><span class="ic">👍</span>NÊN</button>
      <button class="choice khong" id="btnKhong"><span class="ic">👎</span>KHÔNG NÊN</button>
    </div>
    <div id="fb"></div>
  </section>

  <!-- END -->
  <section id="endScreen" class="screen" hidden>
    <div id="endEmoji">🏆</div>
    <h2 id="endTitle"></h2>
    <p id="endStats"></p>
    <div class="recap">
      <h3>📋 Ghi nhớ 10 nội quy phòng tin học</h3>
      <ul id="recapList"></ul>
    </div>
    <button class="big-btn green" id="replayBtn">🔄 Chơi lại</button>
  </section>

  <p class="credit">Cô Bùi Thị Phương Trúc • Trường Trung-Tiểu học Pétrus Ký</p>
</div>

<script>
/* ================= 10 NỘI QUY ================= */
const RULES = [
  {emoji:'🧍‍♂️🧍‍♀️', behavior:'Xếp hàng vào lớp ngay ngắn',           good:true,  rule:'Xếp hàng vào lớp ngay ngắn'},
  {emoji:'🪑',        behavior:'Ngồi đúng chỗ của mình',                good:true,  rule:'Ngồi đúng chỗ'},
  {emoji:'🤫',        behavior:'Giữ trật tự trong giờ học',             good:true,  rule:'Giữ trật tự'},
  {emoji:'🖐️',       behavior:'Báo ngay với cô khi máy tính bị hỏng',  good:true,  rule:'Báo ngay với cô khi máy tính gặp sự cố'},
  {emoji:'🍔🥤',      behavior:'Ăn uống trong phòng máy tính',          good:false, rule:'Không ăn uống trong phòng máy tính'},
  {emoji:'🔌⚡',      behavior:'Tự ý sờ vào ổ điện, dây điện',          good:false, rule:'Không được động vào ổ điện hay dây điện'},
  {emoji:'💻❤️',      behavior:'Giữ gìn máy tính cẩn thận',             good:true,  rule:'Giữ gìn máy tính cẩn thận'},
  {emoji:'🧸',        behavior:'Mang đồ chơi vào lớp',                   good:false, rule:'Không mang đồ chơi'},
  {emoji:'✋',        behavior:'Giơ tay xin phép khi muốn ra ngoài',     good:true,  rule:'Giơ tay xin phép khi muốn đi vệ sinh hay ra ngoài'},
  {emoji:'🧹✨',      behavior:'Sắp xếp bàn ghế gọn gàng trước khi về',  good:true,  rule:'Trước khi ra về thì sắp xếp bàn ghế gọn gàng'},
];

/* ================= ÂM THANH ================= */
let soundOn=true, actx=null;
function ensureAudio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } }
function tone(kind){
  if(!soundOn) return; ensureAudio(); if(!actx) return;
  const now=actx.currentTime;
  const notes=kind==='good'?[660,880,1180]:kind==='win'?[660,880,1100,1320,1560]:kind==='bad'?[220,160]:[520];
  notes.forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain();
    o.type=kind==='bad'?'sawtooth':'triangle'; o.frequency.value=f; const t=now+i*0.09;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.17); });
}
let viVoice=null;
function pickVoice(){ const vs=window.speechSynthesis?speechSynthesis.getVoices():[]; viVoice=vs.find(v=>/vi[-_]?VN/i.test(v.lang))||vs.find(v=>/vietnam/i.test(v.name))||null; }
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(t){ if(!soundOn||!window.speechSynthesis)return; try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='vi-VN'; if(viVoice)u.voice=viVoice; u.rate=0.95; u.pitch=1.15; speechSynthesis.speak(u);}catch(e){} }
function speakThen(t,cb){ let done=false; const go=()=>{if(done)return;done=true;cb();};
  if(!soundOn||!window.speechSynthesis){ setTimeout(go,1500); return; }
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='vi-VN'; if(viVoice)u.voice=viVoice; u.rate=0.95; u.pitch=1.15;
    u.onend=go; u.onerror=()=>setTimeout(go,300); speechSynthesis.speak(u); setTimeout(go,Math.max(2200,t.length*95)); }catch(e){ setTimeout(go,1600); }
}

/* ================= TRẠNG THÁI ================= */
let questions=[], qi=0, score=0, stars=0, streak=0, maxStreak=0, correctCount=0, locked=false, lastSpeak='';
const TOTAL=RULES.length;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
const CUTE=['🌟','😄','🎈','🍭','🦄','🐣','🌈','💖','🎉','⭐','🥳','👏'];
const PRAISE=['Giỏi quá!','Đúng rồi!','Chính xác!','Tuyệt vời!','Hoan hô!'];

const btnNen=document.getElementById('btnNen'), btnKhong=document.getElementById('btnKhong');

function renderRound(){
  if(qi>=TOTAL) return endGame();
  locked=false;
  const q=questions[qi];
  document.getElementById('qnum').textContent=qi+1;
  document.getElementById('progressFill').style.width=(qi/TOTAL*100)+'%';
  document.getElementById('cardEmoji').textContent=q.emoji;
  document.getElementById('cardText').textContent=q.behavior;
  document.getElementById('fb').textContent=''; document.getElementById('fb').className='';
  [btnNen,btnKhong].forEach(b=>{b.className='choice '+(b===btnNen?'nen':'khong');});
  lastSpeak=q.behavior+'. Điều này nên hay không nên?';
  speak(lastSpeak);
}

function answer(choice){
  if(locked) return; locked=true;
  const q=questions[qi];
  const correct=(q.good && choice==='nen')||(!q.good && choice==='khong');
  const chosen=choice==='nen'?btnNen:btnKhong;
  const rightBtn=q.good?btnNen:btnKhong;
  const fb=document.getElementById('fb');
  if(correct){
    chosen.classList.add('right'); tone('good');
    score+=10; correctCount++; streak++; if(streak>maxStreak)maxStreak=streak; stars++;
    document.getElementById('score').textContent=score; document.getElementById('stars').textContent=stars;
    flashPill('scorePill'); flashPill('starPill'); updateStreak();
    const r=chosen.getBoundingClientRect(), cx=r.left+r.width/2;
    cutePop(cx,r.top+6); floatGain(cx,r.top-16); confetti(cx,r.top+r.height/2);
    fb.textContent=rnd(PRAISE)+' 🎉'; fb.className='good';
    speakThen(rnd(PRAISE)+' '+q.rule, next);
  }else{
    chosen.classList.add('wrongpick'); rightBtn.classList.add('reveal'); tone('bad'); streak=0; updateStreak();
    fb.textContent = q.good ? 'Chưa đúng — Đây là điều NÊN làm!' : 'Chưa đúng — Đây là điều KHÔNG NÊN!';
    fb.className='bad';
    speakThen('Chưa đúng nhé. '+(q.good?'Đây là điều nên làm. ':'Đây là điều không nên. ')+q.rule, next);
  }
  document.getElementById('progressFill').style.width=((qi+1)/TOTAL*100)+'%';
}
function next(){ qi++; renderRound(); }

btnNen.addEventListener('click',()=>answer('nen'));
btnKhong.addEventListener('click',()=>answer('khong'));
document.getElementById('listenBtn').addEventListener('click',()=>speak(lastSpeak));

/* ================= HIỆU ỨNG ================= */
function flashPill(id){ const el=document.getElementById(id); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
function updateStreak(){ const p=document.getElementById('streakPill');
  if(streak>=2){ p.hidden=false; document.getElementById('streak').textContent=streak; flashPill('streakPill'); } else p.hidden=true; }
function cutePop(x,y){ const d=document.createElement('div'); d.className='cute'; d.textContent=rnd(CUTE); d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1100); }
function floatGain(x,y){ const d=document.createElement('div'); d.className='gain'; d.textContent='+10'; d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1100); }
function confetti(cx,cy){ const ic=['⭐','✨','🌟','💫','🎊','🎈'];
  for(let i=0;i<10;i++){ const s=document.createElement('div'); s.className='burst'; s.textContent=ic[i%ic.length];
    s.style.left=cx+'px'; s.style.top=cy+'px'; const a=Math.PI*2*i/10, d=60+Math.random()*45;
    s.style.setProperty('--dx',Math.cos(a)*d+'px'); s.style.setProperty('--dy',(Math.sin(a)*d-16)+'px');
    document.body.appendChild(s); setTimeout(()=>s.remove(),1000); } }

/* ================= KẾT THÚC ================= */
function endGame(){
  document.getElementById('gameScreen').hidden=true;
  document.getElementById('hud').hidden=true;
  document.getElementById('endScreen').hidden=false;
  let title,emoji; const r=correctCount/TOTAL;
  if(r>=0.9){title='Xuất sắc! Bé thuộc nội quy rồi!';emoji='🏆';}
  else if(r>=0.6){title='Giỏi lắm! Bé nhớ rất tốt!';emoji='🎉';}
  else {title='Cố gắng thêm nhé, bé làm được mà!';emoji='🌱';}
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endStats').innerHTML=`Trả lời đúng: <span class="big">${correctCount}</span>/${TOTAL}<br>Điểm: <span class="big">${score}</span> 🏅`;
  document.getElementById('recapList').innerHTML=RULES.map((it,i)=>`<li><span class="n">${i+1}.</span> ${it.rule}</li>`).join('');
  tone('win'); speak(title+' Bé trả lời đúng '+correctCount+' trên '+TOTAL+' câu.');
}

/* ================= KHỞI ĐỘNG ================= */
document.getElementById('qtot').textContent=TOTAL;
function startGame(){
  ensureAudio();
  questions=shuffle(RULES); qi=0; score=0; stars=0; streak=0; maxStreak=0; correctCount=0;
  ['score','stars'].forEach(id=>document.getElementById(id).textContent=0);
  document.getElementById('streakPill').hidden=true;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('startScreen').hidden=true;
  document.getElementById('endScreen').hidden=true;
  document.getElementById('gameScreen').hidden=false;
  document.getElementById('hud').hidden=false;
  renderRound();
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('replayBtn').addEventListener('click',startGame);
document.getElementById('soundBtn').addEventListener('click',()=>{
  soundOn=!soundOn; document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  if(!soundOn && window.speechSynthesis) speechSynthesis.cancel();
});
</script>
</body>
</html>
