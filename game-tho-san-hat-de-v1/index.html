<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thợ Săn Hạt Dẻ V1 - Quiz Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://i.postimg.cc/RZ0cw4R1/background-forest.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 3px solid #8B4513;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .title { font-size: 2rem; color: #5D4037; margin-bottom: 10px; }

        .timer-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #A5D6A7 0%, #81C784 100%);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #4CAF50;
        }

        .timer { font-size: 1.3rem; color: #B71C1C; font-weight: bold; }
        .score { font-size: 1.3rem; color: #1B5E20; font-weight: bold; }
        .progress { font-size: 1rem; color: #33691E; font-weight: 600; }

        .question-number { font-size: 0.9rem; color: #795548; margin-bottom: 10px; font-weight: 600; }
        .question {
            font-size: 1.3rem; color: #3E2723; margin-bottom: 15px; line-height: 1.5;
            background: #FFF8E1; padding: 15px; border-radius: 10px; border: 2px dashed #FF8F00;
        }
        .question-icon {
            display: block; margin: 15px auto; max-height: 60px;
            background: #FFECB3; padding: 10px; border-radius: 8px; border: 2px solid #FFA000;
        }

        .answers { display: grid; gap: 12px; }
        .answer-btn {
            display: flex; align-items: center; padding: 15px 20px;
            background: linear-gradient(135deg, #FFF9C4 0%, #FFF59D 100%);
            border: 2px solid #F9A825; border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; font-size: 1.1rem;
        }
        .answer-btn:hover:not(.disabled) {
            background: linear-gradient(135deg, #FFEE58 0%, #FDD835 100%);
            border-color: #F57F17; transform: translateX(5px);
        }
        .answer-btn.correct { background: linear-gradient(135deg, #A5D6A7 0%, #66BB6A 100%); border-color: #2E7D32; }
        .answer-btn.wrong { background: linear-gradient(135deg, #EF9A9A 0%, #E57373 100%); border-color: #C62828; }
        .answer-btn.disabled { cursor: not-allowed; opacity: 0.7; }
        .answer-label {
            font-weight: bold; margin-right: 15px;
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%);
            color: white; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        .start-screen, .result-screen { text-align: center; padding: 40px 20px; }
        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%);
            color: white; border: 3px solid #3E2723; padding: 15px 40px;
            font-size: 1.2rem; border-radius: 30px; cursor: pointer;
            transition: transform 0.3s; margin-top: 20px;
        }
        .start-btn:hover, .restart-btn:hover { transform: scale(1.05); }

        .mascot { font-size: 4rem; margin-bottom: 15px; }
        .subtitle { color: #5D4037; margin: 15px 0; font-size: 1.1rem; }
        .info-text { color: #795548; font-weight: 500; }
        .hidden { display: none !important; }

        .dialog-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .dialog-box {
            background: white; border-radius: 20px; padding: 40px;
            max-width: 450px; width: 90%; text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4); border: 4px solid #8D6E63;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .result-icon { font-size: 4rem; margin-bottom: 20px; }
        .result-title { font-size: 1.8rem; color: #3E2723; margin-bottom: 15px; }
        .result-stats {
            background: linear-gradient(135deg, #C8E6C9 0%, #A5D6A7 100%);
            padding: 20px; border-radius: 15px; margin: 20px 0; border: 2px solid #4CAF50;
        }
        .stat-item {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid #81C784; color: #1B5E20; font-weight: 500;
        }
        .stat-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="startScreen" class="start-screen">
            <div class="mascot">🐿️</div>
            <h1 class="title">Thợ Săn Hạt Dẻ</h1>
            <p class="subtitle">Trả lời các câu hỏi về phần mềm máy tính</p>
            <p class="info-text">🌰 3 câu hỏi trắc nghiệm</p>
            <button class="start-btn" onclick="startQuiz()">Bắt Đầu 🚀</button>
        </div>

        <div id="quizScreen" class="hidden">
            <div class="header"><h1 class="title">🐿️ Thợ Săn Hạt Dẻ</h1></div>
            <div class="timer-score">
                <div class="timer">⏱️ <span id="timer">00:00</span></div>
                <div class="progress">Câu <span id="currentQ">1</span>/3</div>
                <div class="score">🌰 <span id="score">0</span> điểm</div>
            </div>
            <div class="question-container">
                <div class="question-number" id="questionNumber">Câu hỏi 1</div>
                <div class="question" id="questionText"></div>
                <img id="questionIcon" class="question-icon hidden" src="" alt="Icon">
                <div class="answers" id="answersContainer"></div>
            </div>
        </div>
    </div>

    <div id="resultDialog" class="dialog-overlay hidden">
        <div class="dialog-box">
            <div class="result-icon" id="resultIcon">🎉</div>
            <h2 class="result-title" id="resultTitle">Hoàn thành!</h2>
            <div class="result-stats">
                <div class="stat-item"><span>📝 Số câu đúng:</span><span id="correctCount">0/3</span></div>
                <div class="stat-item"><span>🌰 Điểm số:</span><span id="finalScore">0</span></div>
                <div class="stat-item"><span>⏱️ Thời gian:</span><span id="finalTime">00:00</span></div>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">Chơi Lại 🔄</button>
        </div>
    </div>

        let currentQuestion = 0;
        let score = 0;
        let correctAnswers = 0;
        let timerInterval = null;
        let seconds = 0;

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            correctAnswers = 0;
            seconds = 0;

            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '00:00';

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                seconds++;
                var mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                var secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = mins + ':' + secs;
            }, 1000);

            showQuestion();
        }

        function showQuestion() {
            var q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = 'Câu hỏi ' + (currentQuestion + 1);
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = q.question;

            var iconEl = document.getElementById('questionIcon');
            if (q.icon) {
                iconEl.src = q.icon;
                iconEl.classList.remove('hidden');
            } else {
                iconEl.classList.add('hidden');
            }

            var container = document.getElementById('answersContainer');
            container.innerHTML = '';

            for (var i = 0; i < q.answers.length; i++) {
                (function(index, answer) {
                    var btn = document.createElement('div');
                    btn.className = 'answer-btn';
                    btn.innerHTML = '<span class="answer-label">' + answer.label + '</span><span>' + answer.text + '</span>';
                    btn.onclick = function() { selectAnswer(index, answer.correct); };
                    container.appendChild(btn);
                })(i, q.answers[i]);
            }
        }

        function selectAnswer(index, isCorrect) {
            var buttons = document.querySelectorAll('.answer-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.add('disabled');
                buttons[i].onclick = null;
            }

            if (isCorrect) {
                buttons[index].classList.add('correct');
                score++;
                correctAnswers++;
                document.getElementById('score').textContent = score;
            } else {
                buttons[index].classList.add('wrong');
                for (var j = 0; j < questions[currentQuestion].answers.length; j++) {
                    if (questions[currentQuestion].answers[j].correct) {
                        buttons[j].classList.add('correct');
                    }
                }
            }

            setTimeout(function() {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            document.getElementById('correctCount').textContent = correctAnswers + '/3';
            document.getElementById('finalScore').textContent = score + ' điểm';

            var mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            var secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('finalTime').textContent = mins + ':' + secs;

            if (correctAnswers === 3) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = 'Xuất sắc! Bạn trả lời đúng tất cả!';
            } else if (correctAnswers >= 2) {
                document.getElementById('resultIcon').textContent = '🎉';
                document.getElementById('resultTitle').textContent = 'Tốt lắm!';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = 'Cố gắng hơn nhé!';
            }

            document.getElementById('resultDialog').classList.remove('hidden');
        }

        function restartQuiz() {
            document.getElementById('resultDialog').classList.add('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }
