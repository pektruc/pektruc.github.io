<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biệt Đội Cứu Hộ Phòng Tin Học</title>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #FF9800;
            --danger: #F44336;
            --bg: #E3F2FD;
            --card-bg: #FFFFFF;
            --text: #212121;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #game-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 4px solid #BBDEFB;
        }

        h1 {
            color: #1565C0;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Khởi động */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #F57C00;
        }

        /* Thống kê */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F5F5F5;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .score-box { color: var(--primary-dark); }
        .progress-box { color: #1565C0; }

        /* Vòng chơi */
        .question-text {
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 600;
            color: #37474F;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #FFF;
            border: 2px solid #CFD8DC;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 18px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover {
            background: #ECEFF1;
            border-color: #90A4AE;
            transform: translateX(5px);
        }

        .option-btn.correct {
            background: #C8E6C9 !important;
            border-color: var(--primary) !important;
            color: var(--primary-dark);
        }

        .option-btn.wrong {
            background: #FFCDD2 !important;
            border-color: var(--danger) !important;
            color: var(--danger);
        }

        /* Huy hiệu & Kết quả */
        .badge-icon {
            font-size: 80px;
            margin: 20px 0;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .result-msg {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .rule-tip {
            background: #FFF9C4;
            border-left: 5px solid #FBC02D;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 10px 10px 0;
            text-align: left;
            font-style: italic;
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- MÀN HÌNH BẮT ĐẦU -->
    <div id="start-screen" class="screen active">
        <h1>🖥️ BIỆT ĐỘI CỨU HỘ PHÒNG TIN 🖥️</h1>
        <p style="font-size: 18px; margin-bottom: 15px;">Chào mừng các em đến với thử thách giữ gìn phòng Tin học đạt chuẩn ngăn nắp!</p>
        <p style="color: #666; margin-bottom: 25px;">Vượt qua 10 tình huống để nhận ngay huy hiệu Hiệp Sĩ. Trả lời đúng +10đ, sai -5đ nhé!</p>
        <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
    </div>

    <!-- MÀN HÌNH CHƠI GAME -->
    <div id="quiz-screen" class="screen">
        <div class="status-bar">
            <div class="progress-box">Tình huống: <span id="current-question">1</span>/10</div>
            <div class="score-box">Điểm: <span id="score">0</span></div>
        </div>
        <div class="question-text" id="question-text">Đang tải câu hỏi...</div>
        <div class="options-container" id="options-container"></div>
        <div class="rule-tip" id="rule-tip"></div>
        <button class="btn" id="next-btn" style="display: none; margin-top: 25px;" onclick="nextQuestion()">TIẾP TỤC ➡️</button>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="screen">
        <h1>🎉 TỔNG KẾT THỬ THÁCH 🎉</h1>
        <div class="badge-icon" id="badge-icon">🏅</div>
        <div class="result-msg" id="result-msg">Số điểm của bạn</div>
        <p id="result-rank" style="font-size: 18px; margin-bottom: 30px; font-weight: 500;"></p>
        <button class="btn" onclick="resetGame()">CHƠI LẠI ĐỂ ĐỔI HUY HIỆU</button>
    </div>
</div>

<script>
    // Dữ liệu 10 nội quy sinh động
    const quizData = [
        {
            q: "Để chuẩn bị vào phòng máy, lớp chúng mình nên tập trung trước cửa như thế nào nhỉ?",
            o: ["Chen lấn xô đẩy ai khỏe hơn thì vào trước", "Xếp hàng ngay ngắn, thẳng hàng và giữ trật tự", "Chạy nhảy nô đùa xung quanh hành lang"],
            a: 1,
            rule: "Nội quy 1: Xếp hàng vào lớp ngay ngắn."
        },
        {
            q: "Bạn Bo thấy máy số 5 có tai nghe đẹp hơn nên tự ý chạy qua ngồi, dù cô đã xếp Bo ngồi máy số 2. Bo làm thế đúng hay sai?",
            o: ["Đúng, thích máy nào ngồi máy đó!", "Sai, phải ngồi đúng vị trí được phân công."],
            a: 1,
            rule: "Nội quy 2: Ngồi đúng chỗ."
        },
        {
            q: "Khi thầy cô đang giảng bài trên bảng hoặc hướng dẫn thực hành, chúng mình cần làm gì?",
            o: ["Quay sang nói chuyện oang oang với bạn bên cạnh", "Tranh thủ bật game chơi", "Giữ trật tự, chú ý lắng nghe và quan sát"],
            a: 2,
            rule: "Nội quy 3: Giữ trật tự."
        },
        {
            q: "Đang thực hành thì máy tính của em bỗng tắt lịm màn hình hoặc hiện lỗi lạ. Em sẽ xử lý thế nào?",
            o: ["Tự ý rút dây nguồn ra cắm lại xem sao", "Giơ tay báo ngay với thầy cô giáo để xử lý", "Ngồi im giả vờ như không có gì xảy ra"],
            a: 1,
            rule: "Nội quy 4: Báo ngay với cô khi máy tính gặp sự cố."
        },
        {
            q: "Trời nắng nóng, mang một ly trà sữa ngọt lịm hoặc gói bim bim vào vừa ăn vừa gõ máy tính có được không?",
            o: ["Được chứ, vừa ăn vừa học mới vui", "Tuyệt đối không ăn uống trong phòng Tin học để tránh đổ nước làm hỏng máy"],
            a: 1,
            rule: "Nội quy 5: Không ăn uống trong lớp."
        },
        {
            q: "Bạn đánh rơi bút chì vào gầm bàn, nơi có ổ điện và nhiều dây cắm chằng chịt. Bạn định thò tay vào móc ra. Em khuyên bạn thế nào?",
            o: ["Ngăn bạn lại ngay! Tuyệt đối không chạm vào ổ điện/dây điện vì rất dễ bị điện giật", "Cổ vũ bạn thò tay lấy thật nhanh", "Lấy cây thước sắt chọc vào tìm phụ bạn"],
            a: 0,
            rule: "Nội quy 6: Không được động vào ổ điện hay dây điện."
        },
        {
            q: "Hành động nào sau đây là yêu thương và bảo vệ người bạn máy tính?",
            o: ["Gõ phím thật mạnh, giật dây chuột", "Dùng bút vẽ trang trí lên màn hình cho đẹp", "Gõ bàn phím nhẹ nhàng, di chuyển chuột cẩn thận"],
            a: 2,
            rule: "Nội quy 7: Giữ gìn máy tính cẩn thận."
        },
        {
            q: "Hôm nay em được mẹ mua cho một con robot siêu nhân rất đẹp, em có nên mang vào đặt cạnh máy tính để cùng học không?",
            o: ["Không mang đồ chơi vào phòng Tin học để tránh mất tập trung và lạc mất đồ", "Có, đem vào khoe với các bạn trong lớp"],
            a: 0,
            rule: "Nội quy 8: Không mang đồ chơi."
        },
        {
            q: "Trong giờ học, nếu em đột xuất muốn đi vệ sinh hoặc ra ngoài có việc, em phải làm gì?",
            o: ["Cứ âm thầm lẻn ra ngoài không cần nói ai", "Giơ tay ngay ngắn xin phép, được thầy cô đồng ý mới ra ngoài", "Nói to cắt ngang lời thầy cô đang giảng"],
            a: 1,
            rule: "Nội quy 9: Giơ tay xin phép khi muốn đi vệ sinh hay ra ngoài."
        },
        {
            q: "Tiếng chuông báo hết giờ học vang lên, trước khi bước ra khỏi phòng máy, chúng mình phải làm gì?",
            o: ["Sắp xếp bàn ghế gọn gàng, đẩy ghế vào gầm bàn ngăn nắp", "Đứng dậy chạy thật nhanh ra cửa để về trước", "Để nguyên ghế xô lệch, sách vở bừa bãi"],
            a: 0,
            rule: "Nội quy 10: Trước khi ra về thì sắp xếp bàn ghế gọn gàng."
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    // Bộ phát âm thanh giả lập bằng Web Audio API không cần file MP3 bên ngoài
    function playTone(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'wrong') {
            osc.frequency.setValueAtTime(220, ctx.currentTime); // A3
            osc.frequency.setValueAtTime(164.81, ctx.currentTime + 0.15); // E3
            gain.gain.setValueAtTime(0.4, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.35);
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startGame() {
        currentIdx = 0;
        score = 0;
        document.getElementById('score').innerText = score;
        showScreen('quiz-screen');
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('rule-tip').style.display = 'none';
        
        const data = quizData[currentIdx];
        document.getElementById('current-question').innerText = currentIdx + 1;
        document.getElementById('question-text').innerText = `Tình huống ${currentIdx + 1}: ${data.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        data.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(idx, btn);
            container.appendChild(btn);
        });
    }

    function selectOption(selectedIdx, btnElement) {
        if (answered) return;
        answered = true;
        
        const data = quizData[currentIdx];
        const buttons = document.querySelectorAll('.option-btn');
        
        if (selectedIdx === data.a) {
            btnElement.classList.add('correct');
            score += 10;
            playTone('correct');
        } else {
            btnElement.classList.add('wrong');
            buttons[data.a].classList.add('correct');
            score = Math.max(0, score - 5); // Không để điểm âm
            playTone('wrong');
        }
        
        document.getElementById('score').innerText = score;
        
        // Hiển thị nội quy ghi nhớ
        const tip = document.getElementById('rule-tip');
        tip.innerText = `💡 Bí kíp nhớ: ${data.rule}`;
        tip.style.display = 'block';
        
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        showScreen('result-screen');
        document.getElementById('result-msg').innerText = `Em đã đạt được: ${score} / 100 điểm!`;
        
        const badge = document.getElementById('badge-icon');
        const rank = document.getElementById('result-rank');
        
        if (score >= 80) {
            badge.innerText = '👑';
            rank.innerText = 'Xuất sắc! Em chính là Hiệp Sĩ Bảo Vệ Phòng Tin Học Đích Thực! Thầy cô tự hào về em!';
            rank.style.color = 'var(--primary-dark)';
        } else if (score >= 50) {
            badge.innerText = '🛡️';
            rank.innerText = 'Khá tốt! Em đã nắm được hòn đá hộ mệnh phòng máy. Luyện tập thêm một chút để đạt điểm tối đa nha!';
            rank.style.color = 'var(--secondary)';
        } else {
            badge.innerText = '👾';
            rank.innerText = 'Ôi! Quái vật bừa bộn đang xâm chiếm rồi. Hãy thử sức lại để nâng cao bí kíp phòng thân nhé!';
            rank.style.color = 'var(--danger)';
        }
    }

    function resetGame() {
        showScreen('start-screen');
    }
</script>

</body>
</html>
