<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghép Bóng Máy Tính - Lớp 1</title>
<style>
  :root{ --ink:#2b3a55; --green:#25c15c; --red:#ff6b6b; --amber:#f4b860; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none!important}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Nunito',sans-serif;
    background:linear-gradient(160deg,#b7ecff,#eaf8ff 55%,#fff);color:var(--ink);min-height:100vh;
    overflow-x:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  #app{max-width:960px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column}

  /* HUD */
  #hud{display:flex;align-items:center;gap:8px;background:#fff;border-radius:18px;padding:8px 12px;
    box-shadow:0 6px 18px rgba(43,58,85,.12);margin-bottom:12px;flex-wrap:wrap}
  #hud .pill{font-weight:800;font-size:1rem;background:#f1f7ff;border-radius:14px;padding:6px 12px;white-space:nowrap}
  .progress{flex:1;height:16px;background:#e6eefc;border-radius:12px;overflow:hidden;min-width:60px}
  #progressFill{height:100%;width:0;border-radius:12px;background:linear-gradient(90deg,#7bd88f,#3fc46a);transition:width .4s}
  .hud-score{color:#e8890b}
  #soundBtn{border:none;background:#f1f7ff;font-size:1.3rem;width:44px;height:44px;border-radius:14px;cursor:pointer}
  #soundBtn:active{transform:scale(.92)}
  .pill.bump{animation:bump .45s}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.4)}100%{transform:scale(1)}}

  .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  #gameScreen{justify-content:flex-start;padding-top:4px}
  h1{font-size:clamp(2rem,7vw,3.1rem);line-height:1.1;
    background:linear-gradient(90deg,#ff7eb3,#7c4dff,#00b4d8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 3px 0 rgba(255,255,255,.6))}
  .sub{font-size:clamp(1rem,3.6vw,1.35rem);color:#4a5b78;margin:10px 0 6px;font-weight:700}
  .hint{color:#5a6b88;font-size:1.05rem;margin-top:14px;font-weight:700}
  .hint b{color:#e8890b}
  .big-btn{border:none;cursor:pointer;font-weight:900;color:#fff;font-size:clamp(1.2rem,4vw,1.6rem);padding:16px 34px;border-radius:22px;margin-top:22px;
    background:linear-gradient(180deg,#ffb347,#ff8c00);box-shadow:0 8px 0 #d97400,0 12px 22px rgba(217,116,0,.4);transition:transform .08s,box-shadow .08s}
  .big-btn:active{transform:translateY(6px);box-shadow:0 2px 0 #d97400,0 6px 12px rgba(217,116,0,.4)}
  .big-btn.green{background:linear-gradient(180deg,#67e28c,#25c15c);box-shadow:0 8px 0 #189745,0 12px 22px rgba(24,151,69,.4)}

  .preview{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:16px;max-width:600px}
  .preview .p{width:70px;height:70px;background:#fff;border-radius:15px;box-shadow:0 4px 10px rgba(43,58,85,.12);
    display:flex;align-items:center;justify-content:center;animation:bob 2.6s ease-in-out infinite}
  .preview .p svg{width:52px;height:52px}
  .preview .p:nth-child(2n){animation-delay:.3s}.preview .p:nth-child(3n){animation-delay:.6s}.preview .p:nth-child(4n){animation-delay:.9s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  /* instruction */
  .instruct{font-size:clamp(1.05rem,4vw,1.5rem);font-weight:900;margin:2px 0 14px;color:#2b3a55}
  .instruct .r{color:#e8890b}

  /* slots (bóng mờ) */
  .slots{width:100%;display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:6px}
  .slot{width:clamp(118px,20vw,150px);background:rgba(255,255,255,.45);border:4px dashed #9db4d4;border-radius:22px;
    padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .15s,border-color .15s,background .15s}
  .slot .art{width:100%;aspect-ratio:1/.86;display:flex;align-items:center;justify-content:center}
  .slot .art svg{width:82%;height:82%;max-height:110px}
  .slot .shadow svg{filter:brightness(0);opacity:.16}          /* hình bóng gợi ý */
  .slot .nm{font-weight:800;font-size:.92rem;color:#6b7c99}
  .slot.over{border-color:var(--amber);background:#fff5e2;transform:scale(1.05)}
  .slot.filled{border-style:solid;border-color:var(--green);background:#eafbf0;animation:pop .4s}
  .slot.filled .nm{color:#177a3b}
  @keyframes pop{0%{transform:scale(.7)}70%{transform:scale(1.08)}100%{transform:scale(1)}}

  /* tray (đồ vật màu) */
  .tray{width:100%;min-height:120px;display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:10px;
    background:rgba(255,255,255,.4);border-radius:22px;padding:12px}
  .piece{width:clamp(96px,17vw,128px);aspect-ratio:1/1;background:#fff;border-radius:20px;
    box-shadow:0 6px 14px rgba(43,58,85,.14);display:flex;align-items:center;justify-content:center;
    cursor:grab;touch-action:none;transition:transform .1s;border:3px solid transparent}
  .piece:active{cursor:grabbing}
  .piece svg{width:78%;height:78%;pointer-events:none}
  .piece.wrong{animation:shake .4s;border-color:var(--red)}
  .piece.dragging{opacity:.3}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  #dragGhost{position:fixed;left:0;top:0;z-index:999;pointer-events:none;transform:translate(-50%,-50%) rotate(-5deg) scale(1.08);
    width:120px;height:120px;background:#fff;border-radius:20px;box-shadow:0 12px 26px rgba(43,58,85,.3);display:flex;align-items:center;justify-content:center}
  #dragGhost svg{width:78%;height:78%}

  /* hiệu ứng */
  .cute{position:fixed;z-index:960;pointer-events:none;font-size:3rem;transform:translate(-50%,-50%);animation:cutePop 1.1s ease-out forwards}
  @keyframes cutePop{0%{opacity:0;transform:translate(-50%,-40%) scale(.3) rotate(-15deg)}
    30%{opacity:1;transform:translate(-50%,-70%) scale(1.25) rotate(6deg)}100%{opacity:0;transform:translate(-50%,-150%) scale(1) rotate(0)}}
  .gain{position:fixed;z-index:955;pointer-events:none;font-weight:900;font-size:1.6rem;color:#e8890b;text-shadow:0 2px 0 #fff;
    transform:translate(-50%,-50%);animation:gainrise 1.1s ease-out forwards}
  @keyframes gainrise{0%{opacity:0;transform:translate(-50%,-30%) scale(.5)}20%{opacity:1;transform:translate(-50%,-70%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-160%) scale(1)}}
  .burst{position:fixed;z-index:950;pointer-events:none;font-size:1.5rem;animation:fly 1s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3)}}
  .toast{position:fixed;left:50%;top:34%;transform:translate(-50%,-50%);z-index:965;pointer-events:none;
    font-size:clamp(1.8rem,7vw,2.6rem);font-weight:900;color:#25c15c;text-shadow:0 3px 0 #fff;animation:spop 1.3s ease-out forwards}
  @keyframes spop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}

  #endEmoji{font-size:5rem;animation:bob 2s ease-in-out infinite}
  #endTitle{font-size:clamp(1.6rem,6vw,2.4rem);margin:6px 0}
  #endStats{font-size:1.3rem;font-weight:800;color:#4a5b78;line-height:1.7}
  #endStats .big{font-size:1.9rem;color:#e8890b}
  .credit{text-align:center;color:#6b7c99;font-size:.85rem;padding:12px 0 4px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <header id="hud" hidden>
    <span class="pill">Đã ghép <span id="done">0</span>/<span id="total">10</span></span>
    <div class="progress"><div id="progressFill"></div></div>
    <span class="pill hud-score" id="scorePill">🏅 <span id="score">0</span></span>
    <button id="soundBtn" title="Bật/tắt âm thanh">🔊</button>
  </header>

  <!-- START -->
  <section id="startScreen" class="screen">
    <h1>Ghép Bóng Máy Tính</h1>
    <p class="sub">Kéo đồ vật thả vào đúng cái bóng của nó!</p>
    <div class="preview" id="preview"></div>
    <button class="big-btn" id="startBtn">▶ Bắt đầu chơi</button>
    <p class="hint">👆 Kéo hình <b>màu</b> đặt lên hình <b>bóng mờ</b> giống nó nhé!</p>
  </section>

  <!-- GAME -->
  <section id="gameScreen" class="screen" hidden>
    <div class="instruct">Kéo đồ vật vào đúng <span class="r">cái bóng</span> của nó!</div>
    <div id="slots" class="slots"></div>
    <div id="tray" class="tray"></div>
  </section>

  <!-- END -->
  <section id="endScreen" class="screen" hidden>
    <div id="endEmoji">🎉</div>
    <h2 id="endTitle"></h2>
    <p id="endStats"></p>
    <button class="big-btn green" id="replayBtn">🔄 Chơi lại</button>
  </section>

  <p class="credit">Cô Bùi Thị Phương Trúc • Trường Trung-Tiểu học Pétrus Ký</p>
</div>

<script>
/* ================= 10 ĐỒ VẬT ================= */
const ITEMS = [
  {id:'laptop',      name:'Laptop'},
  {id:'maytinhbang', name:'Máy tính bảng'},
  {id:'manhinh',     name:'Màn hình'},
  {id:'banphim',     name:'Bàn phím'},
  {id:'chuot',       name:'Chuột'},
  {id:'thanmay',     name:'Thân máy'},
  {id:'loa',         name:'Loa'},
  {id:'daydien',     name:'Dây điện'},
  {id:'ocam',        name:'Ổ cắm điện'},
  {id:'tainghe',     name:'Tai nghe'},
];

/* ================= HÌNH VẼ SVG ================= */
function svgFor(id){
  switch(id){
    case 'laptop': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="26" y="22" width="68" height="48" rx="5" fill="#2b3a55"/>
        <rect x="31" y="27" width="58" height="38" rx="3" fill="#8fd3ff"/>
        <circle cx="46" cy="41" r="6" fill="#ffe27a"/>
        <path d="M31 58 L47 47 L59 55 L75 43 L89 56 L89 65 L31 65 Z" fill="#7bd88f"/>
        <path d="M16 78 L104 78 L114 94 L6 94 Z" fill="#d3dcea" stroke="#9aa7ba" stroke-width="2"/>
        <rect x="48" y="82" width="24" height="5" rx="2.5" fill="#9aa7ba"/>
      </svg>`;
    case 'maytinhbang': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="30" y="10" width="60" height="100" rx="11" fill="#2b3a55"/>
        <rect x="36" y="20" width="48" height="80" rx="4" fill="#dbeeff"/>
        <rect x="42" y="27" width="12" height="12" rx="3" fill="#38bdf8"/>
        <rect x="54" y="27" width="12" height="12" rx="3" fill="#7bd88f"/>
        <rect x="66" y="27" width="12" height="12" rx="3" fill="#f4b860"/>
        <rect x="42" y="43" width="12" height="12" rx="3" fill="#ff8fab"/>
        <rect x="54" y="43" width="12" height="12" rx="3" fill="#c8a4ff"/>
        <rect x="66" y="43" width="12" height="12" rx="3" fill="#38bdf8"/>
        <circle cx="60" cy="105" r="3" fill="#8fa0bd"/>
      </svg>`;
    case 'manhinh': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="12" y="16" width="96" height="66" rx="9" fill="#2b3a55"/>
        <rect x="18" y="22" width="84" height="54" rx="5" fill="#8fd3ff"/>
        <circle cx="40" cy="42" r="8" fill="#ffe27a"/>
        <path d="M18 68 L40 52 L56 63 L78 46 L102 64 L102 76 L18 76 Z" fill="#7bd88f"/>
        <rect x="53" y="82" width="14" height="12" fill="#3d5273"/>
        <rect x="36" y="93" width="48" height="9" rx="4" fill="#3d5273"/>
      </svg>`;
    case 'banphim': {
      let keys='';
      for(let r=0;r<3;r++){for(let c=0;c<9;c++){ keys+=`<rect x="${13+c*10.2}" y="${47+r*11}" width="8" height="8" rx="2" fill="#eaf1fb"/>`;}}
      return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="6" y="40" width="108" height="48" rx="10" fill="#3d5273"/>
        ${keys}
        <rect x="34" y="80" width="52" height="7" rx="3" fill="#eaf1fb"/>
      </svg>`;
    }
    case 'chuot': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <path d="M60 24 C60 8 84 12 84 2" fill="none" stroke="#9aa7ba" stroke-width="3" stroke-linecap="round"/>
        <path d="M60 26 C40 26 33 44 33 66 C33 92 45 108 60 108 C75 108 87 92 87 66 C87 44 80 26 60 26 Z" fill="#eef3fa" stroke="#9aa7ba" stroke-width="3"/>
        <path d="M60 27 L60 60" stroke="#9aa7ba" stroke-width="2.5"/>
        <rect x="56" y="40" width="8" height="14" rx="4" fill="#f4b860"/>
      </svg>`;
    case 'thanmay': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="37" y="8" width="46" height="104" rx="9" fill="#d3dcea" stroke="#9aa7ba" stroke-width="2"/>
        <circle cx="60" cy="24" r="7" fill="#67e28c" stroke="#25c15c" stroke-width="2"/>
        <rect x="47" y="40" width="26" height="6" rx="3" fill="#8a97ab"/>
        <rect x="47" y="51" width="26" height="6" rx="3" fill="#8a97ab"/>
        <rect x="49" y="70" width="22" height="3" rx="1.5" fill="#aab6c8"/>
        <rect x="49" y="77" width="22" height="3" rx="1.5" fill="#aab6c8"/>
        <rect x="49" y="84" width="22" height="3" rx="1.5" fill="#aab6c8"/>
        <rect x="47" y="96" width="16" height="6" rx="2" fill="#8a97ab"/>
      </svg>`;
    case 'loa': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="34" y="12" width="42" height="96" rx="8" fill="#3d5273"/>
        <circle cx="55" cy="42" r="15" fill="#22314a"/><circle cx="55" cy="42" r="8" fill="#8fd3ff"/>
        <circle cx="55" cy="82" r="8" fill="#22314a"/><circle cx="55" cy="82" r="3.5" fill="#8fd3ff"/>
        <path d="M84 44 Q92 60 84 76" fill="none" stroke="#f4b860" stroke-width="3" stroke-linecap="round"/>
        <path d="M92 36 Q104 60 92 84" fill="none" stroke="#f4b860" stroke-width="3" stroke-linecap="round"/>
      </svg>`;
    case 'daydien': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <path d="M20 24 C48 18 40 56 66 52 C92 48 84 82 58 90" fill="none" stroke="#3d5273" stroke-width="7" stroke-linecap="round"/>
        <g transform="translate(44 86)">
          <rect x="0" y="0" width="28" height="20" rx="6" fill="#ffd166" stroke="#e0a52e" stroke-width="2"/>
          <rect x="7" y="19" width="4" height="10" rx="2" fill="#9aa7ba"/>
          <rect x="17" y="19" width="4" height="10" rx="2" fill="#9aa7ba"/>
        </g>
        <circle cx="20" cy="24" r="4" fill="#3d5273"/>
      </svg>`;
    case 'ocam': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <rect x="26" y="16" width="68" height="88" rx="14" fill="#eef3fa" stroke="#c3d0e2" stroke-width="3"/>
        <circle cx="60" cy="50" r="23" fill="#fff" stroke="#c3d0e2" stroke-width="2"/>
        <rect x="49" y="46" width="5" height="12" rx="2.5" fill="#3d5273"/>
        <rect x="66" y="46" width="5" height="12" rx="2.5" fill="#3d5273"/>
        <rect x="45" y="80" width="30" height="16" rx="5" fill="#dbe4f0" stroke="#c3d0e2" stroke-width="2"/>
        <rect x="48" y="83" width="11" height="10" rx="2.5" fill="#7bd88f"/>
      </svg>`;
    case 'tainghe': return `
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <path d="M22 70 A38 38 0 0 1 98 70" fill="none" stroke="#3d5273" stroke-width="9" stroke-linecap="round"/>
        <rect x="12" y="60" width="24" height="40" rx="11" fill="#3d5273"/>
        <rect x="84" y="60" width="24" height="40" rx="11" fill="#3d5273"/>
        <rect x="18" y="67" width="12" height="26" rx="6" fill="#8fd3ff"/>
        <rect x="90" y="67" width="12" height="26" rx="6" fill="#8fd3ff"/>
        <circle cx="24" cy="80" r="3.4" fill="#f4b860"/>
        <circle cx="96" cy="80" r="3.4" fill="#f4b860"/>
      </svg>`;
  }
  return '';
}

/* ================= ÂM THANH ================= */
let soundOn=true, actx=null;
function ensureAudio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } }
function tone(kind){
  if(!soundOn) return; ensureAudio(); if(!actx) return;
  const now=actx.currentTime;
  const notes = kind==='good'?[660,880,1180]:kind==='win'?[660,880,1100,1320,1560]:kind==='bad'?[200,150]:[520];
  notes.forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=kind==='bad'?'sawtooth':'triangle'; o.frequency.value=f;
    const t=now+i*0.09;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.17);
  });
}
let viVoice=null;
function pickVoice(){ const vs=window.speechSynthesis?speechSynthesis.getVoices():[]; viVoice=vs.find(v=>/vi[-_]?VN/i.test(v.lang))||vs.find(v=>/vietnam/i.test(v.name))||null; }
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(t){ if(!soundOn||!window.speechSynthesis)return; try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='vi-VN'; if(viVoice)u.voice=viVoice; u.rate=0.95; u.pitch=1.2; speechSynthesis.speak(u);}catch(e){} }

/* ================= TRẠNG THÁI ================= */
const ROUND_SIZE=5;
let rounds=[], ri=0, score=0, done=0, locked=false;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
const CUTE=['🌟','😄','🎈','🍭','🦄','🐣','🌈','💖','🎉','⭐','🥳','🌸'];
const PRAISE=['Giỏi quá!','Đúng rồi!','Chính xác!','Tuyệt vời!','Hoan hô!'];

function buildRounds(){
  const all=shuffle(ITEMS), out=[];
  for(let i=0;i<all.length;i+=ROUND_SIZE) out.push(all.slice(i,i+ROUND_SIZE));
  return out;
}

const slotsEl=document.getElementById('slots');
const trayEl=document.getElementById('tray');

function renderRound(){
  if(ri>=rounds.length){ return endGame(); }
  locked=false;
  const items=rounds[ri];
  // bóng mờ (đích)
  slotsEl.innerHTML=shuffle(items).map(it=>
    `<div class="slot" data-id="${it.id}"><div class="art shadow">${svgFor(it.id)}</div><div class="nm">${it.name}</div></div>`).join('');
  // đồ vật màu (kéo)
  trayEl.innerHTML=shuffle(items).map(it=>
    `<div class="piece" data-id="${it.id}">${svgFor(it.id)}</div>`).join('');
}

/* ---- ĐÚNG / SAI ---- */
function placeCorrect(slot, piece, item){
  slot.className='slot filled';
  slot.innerHTML=`<div class="art">${svgFor(item.id)}</div><div class="nm">${item.name}</div>`;
  piece.remove();
  score+=10; document.getElementById('score').textContent=score; flashPill('scorePill');
  done++; document.getElementById('done').textContent=done;
  document.getElementById('progressFill').style.width=(done/ITEMS.length*100)+'%';
  tone('good');
  const r=slot.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  cutePop(cx,cy); floatGain(cx,r.top+6); confetti(cx,cy);
  speak(rnd(PRAISE)+' Đây là '+item.name);
  // hết vòng?
  if(!trayEl.querySelector('.piece')){
    locked=true;
    setTimeout(()=>{ toast(ri<rounds.length-1?'Giỏi quá! 🎉':'Hoàn thành! 🏆'); tone('win'); }, 250);
    setTimeout(()=>{ ri++; renderRound(); }, 1500);
  }
}
function placeWrong(piece){
  tone('bad');
  if(piece){ piece.classList.add('wrong'); setTimeout(()=>piece.classList.remove('wrong'),450); }
}

/* ---- KÉO THẢ (pointer) ---- */
let drag=null, ghost=null;
trayEl.addEventListener('pointerdown',e=>{
  if(locked) return;
  const piece=e.target.closest('.piece'); if(!piece) return;
  e.preventDefault();
  drag={piece,id:piece.dataset.id};
  piece.classList.add('dragging');
  ghost=document.createElement('div'); ghost.id='dragGhost'; ghost.innerHTML=svgFor(drag.id);
  document.body.appendChild(ghost); moveGhost(e.clientX,e.clientY);
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);
});
function moveGhost(x,y){ if(ghost){ghost.style.left=x+'px'; ghost.style.top=y+'px';} }
function slotUnder(x,y){
  if(ghost) ghost.style.display='none';
  const el=document.elementFromPoint(x,y);
  if(ghost) ghost.style.display='';
  return el&&el.closest?el.closest('.slot'):null;
}
function onMove(e){
  if(!drag) return; moveGhost(e.clientX,e.clientY);
  slotsEl.querySelectorAll('.slot.over').forEach(s=>s.classList.remove('over'));
  const s=slotUnder(e.clientX,e.clientY);
  if(s && !s.classList.contains('filled')) s.classList.add('over');
}
function onUp(e){
  window.removeEventListener('pointermove',onMove);
  window.removeEventListener('pointerup',onUp);
  const slot=slotUnder(e.clientX,e.clientY);
  if(ghost){ ghost.remove(); ghost=null; }
  slotsEl.querySelectorAll('.slot.over').forEach(s=>s.classList.remove('over'));
  if(drag.piece) drag.piece.classList.remove('dragging');
  if(slot && !slot.classList.contains('filled')){
    if(slot.dataset.id===drag.id){
      const item=ITEMS.find(x=>x.id===drag.id);
      placeCorrect(slot, drag.piece, item);
    } else placeWrong(drag.piece);
  }
  drag=null;
}

/* ================= HIỆU ỨNG ================= */
function flashPill(id){ const el=document.getElementById(id); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
function cutePop(x,y){ const d=document.createElement('div'); d.className='cute'; d.textContent=rnd(CUTE); d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1100); }
function floatGain(x,y){ const d=document.createElement('div'); d.className='gain'; d.textContent='+10'; d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1100); }
function confetti(cx,cy){
  const ic=['⭐','✨','🌟','💫','🎊','🎈'];
  for(let i=0;i<10;i++){
    const s=document.createElement('div'); s.className='burst'; s.textContent=ic[i%ic.length];
    s.style.left=cx+'px'; s.style.top=cy+'px';
    const ang=Math.PI*2*i/10, dist=60+Math.random()*45;
    s.style.setProperty('--dx',Math.cos(ang)*dist+'px'); s.style.setProperty('--dy',(Math.sin(ang)*dist-16)+'px');
    document.body.appendChild(s); setTimeout(()=>s.remove(),1000);
  }
}
function toast(txt){ const d=document.createElement('div'); d.className='toast'; d.textContent=txt; document.body.appendChild(d); setTimeout(()=>d.remove(),1300); }

/* ================= KẾT THÚC ================= */
function endGame(){
  document.getElementById('gameScreen').hidden=true;
  document.getElementById('hud').hidden=true;
  document.getElementById('endScreen').hidden=false;
  document.getElementById('endEmoji').textContent='🏆';
  document.getElementById('endTitle').textContent='Hoàn thành! Bé giỏi lắm!';
  document.getElementById('endStats').innerHTML=`Bé đã ghép đúng <span class="big">${ITEMS.length}</span> đồ vật<br>Điểm: <span class="big">${score}</span> 🏅`;
  tone('win'); speak('Hoàn thành! Bé giỏi lắm. Bé được '+score+' điểm.');
}

/* ================= KHỞI ĐỘNG ================= */
document.getElementById('preview').innerHTML = ITEMS.map(it=>`<div class="p" title="${it.name}">${svgFor(it.id)}</div>`).join('');
document.getElementById('total').textContent=ITEMS.length;

function startGame(){
  ensureAudio();
  rounds=buildRounds(); ri=0; score=0; done=0;
  document.getElementById('score').textContent=0;
  document.getElementById('done').textContent=0;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('startScreen').hidden=true;
  document.getElementById('endScreen').hidden=true;
  document.getElementById('gameScreen').hidden=false;
  document.getElementById('hud').hidden=false;
  renderRound();
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('replayBtn').addEventListener('click',startGame);
document.getElementById('soundBtn').addEventListener('click',()=>{
  soundOn=!soundOn; document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  if(!soundOn && window.speechSynthesis) speechSynthesis.cancel();
});
</script>
