<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Hình AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        textarea {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }

        textarea::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }

        .result {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }

        .result h2 {
            margin-bottom: 20px;
            color: #00d4ff;
        }

        .result img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #10b981;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: #059669;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }

        .footer p {
            margin: 5px 0;
        }

        .footer strong {
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .input-section, .result {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tạo Hình AI</h1>
        <p class="subtitle">Nhập mô tả hình ảnh bạn muốn tạo</p>

        <div class="input-section">
            <textarea id="prompt" placeholder="Ví dụ: Một con mèo đang chơi đàn piano, phong cách hoạt hình..." rows="4"></textarea>
            <button id="generateBtn" onclick="generateImage()">Tạo Hình</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Đang tạo hình... Vui lòng đợi...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="result" class="result" style="display: none;">
            <h2>Kết quả:</h2>
            <img id="generatedImage" src="" alt="Generated Image">
            <br>
            <a id="downloadBtn" href="" download="ai-image.png" class="download-btn">Tải về</a>
        </div>

        <footer class="footer">
            <p>Thiết kế bởi <strong>Bùi Thị Phương Trúc</strong></p>
            <p>Trường Trung - Tiểu Học Pétrus Ký</p>
        </footer>
    </div>

    <script>
        // Vietnamese character pattern
        const vietnamesePattern = /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i;

        // Translate Vietnamese to English using MyMemory API (FREE)
        async function translateToEnglish(text) {
            // Check if text contains Vietnamese characters
            if (!vietnamesePattern.test(text)) {
                return { translated: text, isTranslated: false };
            }

            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=vi|en`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseData && data.responseData.translatedText) {
                    return {
                        translated: data.responseData.translatedText,
                        isTranslated: true
                    };
                }
            } catch (err) {
                console.error('Translation error:', err);
            }

            // If translation fails, return original text
            return { translated: text, isTranslated: false };
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            const generateBtn = document.getElementById('generateBtn');

            // Validate
            if (!prompt) {
                showError('Vui lòng nhập mô tả hình ảnh!');
                return;
            }

            if (prompt.length > 1000) {
                showError('Mô tả quá dài! Tối đa 1000 ký tự.');
                return;
            }

            // Reset UI
            error.style.display = 'none';
            result.style.display = 'none';
            loading.style.display = 'block';
            generateBtn.disabled = true;

            try {
                // Translate if Vietnamese
                const { translated, isTranslated } = await translateToEnglish(prompt);

                // Generate image using Pollinations.ai (FREE, no API key needed)
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(translated)}?width=1024&height=1024&nologo=true&seed=${Date.now()}`;

                // Load image
                const img = document.getElementById('generatedImage');

                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = imageUrl;
                });

                // Set download link
                document.getElementById('downloadBtn').href = imageUrl;

                result.style.display = 'block';

            } catch (err) {
                showError('Có lỗi xảy ra, vui lòng thử lại!');
                console.error(err);
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        // Ctrl+Enter to submit
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateImage();
            }
        });
    </script>
</body>
</html>
